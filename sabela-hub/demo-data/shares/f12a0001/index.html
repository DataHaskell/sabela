/* ── Header ────────────────────────────────── */
.dashboard-header {
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 24px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  backdrop-filter: saturate(120%) blur(6px);
}
.dashboard-header h1 {
  font-family: var(--font-mono);
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0.3px;
  color: var(--fg-heading);
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.header-actions {
  display: flex;
  gap: 8px;
  align-items: center;
}
.header-actions a,
.header-actions button {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 500;
  padding: 6px 12px;
  border-radius: 6px;

  background: transparent;
  color: var(--fg-dim);
  cursor: pointer;
  text-decoration: none;
  transition: all 0.15s;
}
.header-actions a:hover,
.header-actions button:hover {

  color: var(--accent);
}
.header-actions .icon-btn {
  width: 30px;
  height: 30px;
  padding: 0;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border: 1px solid transparent;
  color: var(--fg-dim);
}
.header-actions .icon-btn:hover {
  background: var(--bg-muted);
  color: var(--fg-heading);
  border-color: transparent;
}
.icon-svg {
  width: 16px;
  height: 16px;
  stroke: currentColor;
  stroke-width: 2;
  fill: none;
  stroke-linecap: round;
  stroke-linejoin: round;
  flex-shrink: 0;
}

  display: none;
  flex-direction: column;
  min-width: 200px;
  padding: 6px;

}

  font-size: 13px;
  text-align: left;
  cursor: pointer;
}
.theme-menu-item:hover {

}
.theme-menu-item.active {
  color: var(--accent);

}

  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.theme-menu-item .sw i {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}
.theme-menu-item.active .nm::after {
  content: ' ✓';
  color: var(--accent);
}
/* ── Main content ──────────────────────────── */
.dashboard-main {
  padding: 32px 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.dashboard-content {
  width: 100%;
  max-width: var(--main-max-w);
}

/* ── Sections (prose cells) ────────────────── */
.dash-section {
  margin-bottom: 24px;
}
.dash-section h1 {
  font-size: 28px;
  font-weight: 700;
  color: var(--fg-heading);
  margin-bottom: 8px;
}
.dash-section h2 {
  font-size: 22px;
  font-weight: 600;
  color: var(--fg-heading);
  margin-bottom: 6px;
}
.dash-section h3 {
  font-size: 18px;
  font-weight: 600;
  color: var(--fg-heading);
  margin-bottom: 4px;
}
.dash-section p {
  margin-bottom: 12px;
}
/* padding-left (not margin-left) so nested lists compound and markers
     have room after the global "* { padding:0 }" reset. */
.dash-section ul,
.dash-section ol,
.dash-output .mime-markdown ul,
.dash-output .mime-markdown ol {
  margin: 0 0 12px;
  padding-left: 1.5em;
}
.dash-section li,
.dash-output .mime-markdown li {
  margin: 3px 0;
}
.dash-section li > ul,
.dash-section li > ol,
.dash-output .mime-markdown li > ul,
.dash-output .mime-markdown li > ol {
  margin: 3px 0 5px;
}
.dash-section ul,
.dash-output .mime-markdown ul {
  list-style: disc;
}
.dash-section ul ul,
.dash-output .mime-markdown ul ul {
  list-style: circle;
}
.dash-section ul ul ul,
.dash-output .mime-markdown ul ul ul {
  list-style: square;
}
.dash-section ol,
.dash-output .mime-markdown ol {
  list-style: decimal;
}
.dash-section a {
  color: var(--accent);
}
.dash-section code {
  font-family: var(--font-mono);
  font-size: 14px;
  background: var(--bg-muted);
  padding: 2px 6px;
  border-radius: 4px;
}
.dash-section pre {
  font-family: var(--font-mono);
  font-size: 14px;
  background: var(--bg-muted);
  padding: 12px 16px;
  border-radius: var(--radius);
  overflow-x: auto;
  margin-bottom: 12px;
}
/* ── Tables (prose + markdown outputs) ─────── */
.dash-section table,
.dash-output .mime-markdown table {
  border-collapse: separate;
  border-spacing: 0;
  width: 100%;
  margin: 14px 0;
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  font-size: 14px;
  box-shadow: var(--shadow);
  background: var(--bg-card);
}
.dash-section th,
.dash-section td,
.dash-output .mime-markdown th,
.dash-output .mime-markdown td {
  padding: 10px 14px;
  text-align: left;
  border-bottom: 1px solid var(--border-light);
}
.dash-section tr:last-child td,
.dash-output .mime-markdown tr:last-child td {
  border-bottom: none;
}
.dash-section th,
.dash-output .mime-markdown th {
  background: var(--bg-muted);
  color: var(--fg-heading);
  font-weight: 600;
  font-size: 13px;
  letter-spacing: 0.2px;
  border-bottom: 1px solid var(--border);
}
.dash-section tr:nth-child(even) td,
.dash-output .mime-markdown tr:nth-child(even) td {
  background: rgba(var(--accent-rgb), 0.04);
}
.dash-section tbody tr:hover td,
.dash-output .mime-markdown tbody tr:hover td {
  background: rgba(var(--accent-rgb), 0.08);
}
/* Right-align numeric-looking columns automatically isn't possible without JS;
     leave default alignment but tighten cell typography. */
.dash-section td,
.dash-output .mime-markdown td {
  font-variant-numeric: tabular-nums;
}
.dash-section blockquote {
  border-left: 3px solid var(--accent);
  padding: 8px 16px;
  color: var(--fg-dim);
  margin-bottom: 12px;
}
/* ── Output cards ──────────────────────────── */
.dash-output {
  margin-bottom: 24px;
  border: 1px solid var(--border-light);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
}
.dash-output iframe {
  width: 100%;
  border: none;
  display: block;
  min-height: 60px;
}
.dash-output .mime-svg {
  padding: 8px;
}
.dash-output .mime-svg svg {
  max-width: 100%;
  height: auto;
}
.dash-output .mime-image img {
  max-width: 100%;
  display: block;
}
.dash-output .mime-json {
  font-family: var(--font-mono);
  font-size: 13px;
  background: var(--bg-muted);
  padding: 12px 16px;
  white-space: pre-wrap;
  word-break: break-word;
}
.dash-output .mime-markdown {
  padding: 16px;
}
.dash-output .mime-latex {
  padding: 16px;
  text-align: center;
}
.dash-output .mime-plain {
  font-family: var(--font-mono);
  font-size: 14px;
  padding: 12px 16px;
  white-space: pre-wrap;
}

/* ── Inline widgets ────────────────────────── */
.dash-widget {
  margin-bottom: 8px;
  border-radius: 6px;
  overflow: hidden;
  background: var(--bg-muted);
}
.dash-widget iframe {
  width: 100%;
  border: none;
  display: block;
  height: 36px;
}
.dash-widget .static-widget {
  font-size: 14px;
  padding: 6px 12px;
}
.dash-widget .static-widget input[disabled],
.dash-widget .static-widget select[disabled] {
  opacity: 0.7;
  cursor: default;
}
/* ── Error display ─────────────────────────── */
.dash-error {
  margin-bottom: 24px;
  padding: 12px 16px;
  border: 1px solid var(--err-border);
  border-radius: var(--radius);
  background: var(--err-bg);
  color: var(--err-fg);
  font-family: var(--font-mono);
  font-size: 13px;
  white-space: pre-wrap;
}

/* ── Status indicator ──────────────────────── */
.dash-status {
  position: fixed;
  bottom: 16px;
  right: 16px;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  background: var(--bg-muted);
  border: 1px solid var(--border);
  color: var(--fg-dim);
  display: none;
}
.dash-status.visible {
  display: block;
}
.dash-status.running {
  color: var(--accent);
  border-color: var(--accent);
}

/* ── Responsive ────────────────────────────── */
@media (max-width: 768px) {
  .dashboard-main {
    padding: 16px;
  }
  .dashboard-content {
    max-width: 100%;
  }
}
/* ── Print / Save as PDF ───────────────────────
     Force a light, ink-friendly page regardless of the on-screen theme, hide
     the app chrome, and make tall outputs paginate cleanly. Content iframes are
     swapped for inline .print-inline DOM by printToPdf() before this applies. */
@media print {
  :root,
  :root[data-theme='dark'] {
    --bg: #ffffff;
    --bg-muted: #f6f6f6;
    --bg-card: #ffffff;
    --fg: #111111;
    --fg-dim: #555555;
    --fg-heading: #000000;
    --accent: #0050d0;
    --accent-rgb: 0, 80, 208;
    --border: #cccccc;
    --border-light: #e0e0e0;
    --shadow: none;
  }
  html,
  body {
    height: auto;
    overflow: visible;
  }
  body {
    font-size: 11pt;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  @page {
    margin: 18mm 14mm;
  }

  /* Hide app chrome — only prose + outputs (and code, in notebook mode) print. */
  .dashboard-header,
  .dash-status {
    display: none !important;
  }
  .dashboard-main {
    padding: 0;
    display: block;
  }
  .dashboard-content {
    max-width: 100%;
  }

  * {
    box-shadow: none !important;
  }

  /* Keep small blocks whole; let tall tables split with a repeating header. */
  .dash-section,
  .dash-code,
  .dash-widget,
  .dash-error,
  .dash-output:not(:has(table)) {
    break-inside: avoid;
  }
  .dash-output,
  .print-inline {
    break-inside: auto;
  }
  table {
    break-inside: auto;
  }
  thead {
    display: table-header-group;
  }
  tr,
  img,
  svg {
    break-inside: avoid;
  }
  h1,
  h2,
  h3 {
    break-after: avoid;
  }

  /* Wrap long lines so nothing clips off the right edge of the page. */
  .dash-code code,
  .dash-output .mime-plain,
  .dash-output .mime-json,
  .print-inline pre {
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* Inlined HTML outputs: base typography + reuse the prose table styling. */
  .print-inline {
    font-size: 11pt;

window.__SABELA_STATIC__ = {"nbCells":[{"cellDirty":false,"cellError":null,"cellId":0,"cellLang":"Haskell","cellOutputs":[],"cellSource":"# Functional Reactive Programming in Sabela\n\nCreating programs that use and produce multimedia requires reasoning about\nwhen things happen and why they happen. For example, a game is a series of\nintricate rules that govern what happens when a character moves forward,\ncollects a valuable item, or interacts with another character.\nWriting this kind of code gets complicated quickly since we think of programming\nas the process of writing sequential computer instructions. All the logic\nin a game is typically written into a large loop that, at every iteration,\nchecks if conditions of interest are met.\n\nFunctional reactive programming promises to make writing such code clearer.\n\nIt does this by describing the things that change over time, and the events that\nhappen, as ordinary values. Instead of maintaining the loop yourself, you write\ndown how each value relates to time and let the runtime do the sampling.\n\nThe model was proposed by Conal Elliott and Paul Hudak when they asked what an\nanimation actually is, and answered with two abstractions: behaviours and events.\n\nA *behaviour* is a value that varies continuously over time.\nAn *event* is something that happens at a moment.\nTheir paper, Functional Reactive Animation, is the root that Yampa,\nreactive-banana, and (more loosely) React and Elm grew from.\n\nThis notebook is that model. It ships with every Sabela notebook, so there is\nnothing to install, and it assumes no Haskell or FRP going in. Run each cell and\nwatch.\n\n## The north star\n\nHere is the destination: a blue circle that slides up and down, in one line.\n\n","cellType":"ProseCell"},{"cellDirty":false,"cellError":null,"cellId":1,"cellLang":"Haskell","cellOutputs":[{"oiMime":"text/html","oiOutput":"<div><\/div><script>(function(){var frames=[\"<svg xmlns=\\\"http:\\/\\/www.w3.org\\/2000\\/svg\\\" wid ewBox=\\\"0 0 300 300\\\"><g fill=\\\"blue\\\"><circle cx=\\\"150\\\" cy=\\\"188.93258715074387\\\" r=\\\"30\\\"\\/><\\/g><\\/svg>\",\"<svg xmlns=\\\"http:\\/\\/www.w3.org\\/2000\\/svg\\\" width=\\\"300\\\" height=\\\"300\\\" viewBox=\\\"0 0 300 300\\\"><g fill=\\\"blue\\\"><circle cx=\\\"150\\\" cy=\\\"186.58181013086497\\\" r=\\\"30\\\"\\/><\\/g><\\/svg>\",\"<svg xmlns=\\\"http:\\/\\/www.w3.org\\/2000\\/svg\\\" width=\\\"300\\\" height=\\\"300\\\" viewBox=\\\"0 0 300 300\\\"><g fill=\\\"blue\\\"><circle cx=\\\"150\\\" cy=\\\"184.1903904187064\\\" r=\\\"30\\\"\\/><\\/g><\\/svg>\",\"<svg xmlns=\\\"http:\\/\\/www.w3.org\\/2000\\/svg\\\" width=\\\"300\\\" height=\\\"300\\\" viewBox=\\\"0 0 300 300\\\"><g fill=\\\"blue\\\"><circle cx=\\\"150\\\" cy=\\\"181.76098490125997\\\" r=\\\"30\\\"\\/><\\/g><\\/svg>\",\"<svg xmlns=\\\"http:\\/\\/www.w3.org\\/2000\\/svg\\\" width=\\\"300\\\" height=\\\"300\\\" viewBox=\\\"0 0 300 300\\\"><g fill=\\\"blue\\\"><circle cx=\\\"150\\\" cy=\\\"179.29629266806\\\" r=\\\"30\\\"\\/><\\/g><\\/svg>\",\"<svg xmlns=\\\"http:\\/\\/www.w3.org\\/2000\\/svg\\\" width=\\\"300\\\" height=\\\"300\\\" viewBox=\\\"0 0 300 300\\\"><g fill=\\\"blue\\\"><circle cx=\\\"150\\\" cy=\\\"176.7990520124724\\\" r=\\\"30\\\"\\/><\\/g><\\/svg>\",\"<svg xmlns=\\\"http:\\/\\/www.w3.org\\/2000\\/svg\\\" width=\\\"300\\\" height=\\\"300\\\" viewBox=\\\"0 0 300 300\\\"><g fill=\\\"blue\\\"><circle cx=\\\"150\\\" cy=\\\"174.27203738942848\\\" r=\\\"30\\\"\\/><\\/g><\\/svg>\",\"<svg xmlns=\\\"http:\\/\\/www.w3.org\\/2000\\/svg\\\" width=\\\"300\\\" height=\\\"300\\\" viewBox=\\\"0 0 300 300\\\"><g fill=\\\"blue\\\"><circle cx=\\\"150\\\" cy=\\\"171.7180563329826\\\" r=\\\"30\\\"\\/><\\/g><\\/svg>\",\"<svg xmlns=\\\"http:\\/\\/www.w3.org\\/2000\\/svg\\\" width=\\\"300\\\" height=\\\"300\\\" viewBox=\\\"0 0 300 300\\\"><g fill=\\\"blue\\\"><circle cx=\\\"150\\\" cy=\\\"169.1399463371186\\\" r=\\\"30\\\"\\/><\\/g><\\/svg>\",\"<svg xmlns=\\\"http:\\/\\/www.w3.org\\/2000\\/svg\\\" width=\\\"300\\\" height=\\\"300\\\" viewBox=\\\"0 0 300 300\\\"><g fill=\\\"blue\\\"><circle cx=\\\"150\\\" cy=\\\"166.5405717032707\\\" r=\\\"30\\\"\\/><\\/g><\\/svg>\",\"<svg xmlns=\\\"http:\\/\\/www.w3.org\\/2000\\/svg\\\" width=\\\"300\\\" height=\\\"300\\\" viewBox=\\\"0 0 300 300\\\"><g fill=\\\"blue\\\"><circle cx=\\\"150\\\" cy=\\\"163.922820358061\\\" r=\\\"30\\\"\\/><\\/g><\\/svg>\"];var fps=30;var host=document.currentScript.previousElementSibling;var t0=null;function step(t){if(t0===null)t0=t;var i=Math.floor((t-t0)/1000*fps)%frames.length;host.innerHTML=frames[i];requestAnimationFrame(step);}requestAnimationFrame(step);})();<\/script>\n"}],"cellSource":"animate 3 (\\t -> fill blue (circle (150, 150 + 80 * sin t) 30))\n","cellType":"CodeCell"},{"cellDirty":false,"cellError":null,"cellId":2,"cellLang":"Haskell","cellOutputs":[],"cellSource":"\nIt will not run yet, because nothing has been imported. The rest of the notebook\nworks out what `animate`, `time`, and a picture are. Import first.\n\n","cellType":"ProseCell"},{"cellDirty":false,"cellError":null,"cellId":3,"cellLang":"Haskell","cellOutputs":[],"cellSource":"import Sabela.Notebook\n","cellType":"CodeCell"},{"cellDirty":false,"cellError":null,"cellId":4,"cellLang":"Haskell","cellOutputs":[],"cellSource":"\nThe circle above moves now. Behaviours, pictures, animation, in that order.\n\n## 1. Behaviours: values that flow with time\n\nUnderneath, a behaviour is a function from time to a value, but you rarely write\nthat function yourself. You start instead from two behaviours that are given to\nyou: `time`, which is the clock, and `always x`, which holds the value `x` for all\ntime. Every other behaviour is built from these with ordinary arithmetic, and when\nyou want to know what one of them is at a particular instant, you sample it with\n`at`.\n\n","cellType":"ProseCell"},{"cellDirty":false,"cellError":null,"cellId":5,"cellLang":"Haskell","cellOutputs":[{"oiMime":"text/plain","oiOutput":"(2.5,7,11.0)\n"}],"cellSource":"(at time 2.5, at (always 7) 99, at (2 * time + 1) 5)\n","cellType":"CodeCell"},{"cellDirty":false,"cellError":null,"cellId":6,"cellLang":"Haskell","cellOutputs":[],"cellSource":"\nThe expression `2 * time + 1` looks like ordinary arithmetic, which is the entire point.\nBecause `time` is a behaviour, the whole expression becomes a behaviour\nas well: a value that changes as the clock advances. Functions like `sin`, `cos`,\nand `sqrt` carry over in the same way, so `sin time` describes a wave. None of it\nis computed until you sample it at some instant.\n\n## 2. Drawing pictures\n\nBefore anything can move it first has to be drawn. A picture is a recipe for a drawing,\nso building one paints nothing on its own. To actually see it, you hand it to `picture`.\n\n","cellType":"ProseCell"},{"cellDirty":false,"cellError":null,"cellId":7,"cellLang":"Haskell","cellOutputs":[{"oiMime":"image/svg+xml","oiOutput":"<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"300\" height=\"300\" viewBox=\"0 0 300 300\"><g fill=\"red\"><circle cx=\"150\" cy=\"150\" r=\"80\"/><\/g><\/svg>\n"}],"cellSource":"picture (fill red (circle (150, 150) 80))\n","cellType":"CodeCell"},{"cellDirty":false,"cellError":null,"cellId":8,"cellLang":"Haskell","cellOutputs":[],"cellSource":"\nCoordinates start at the top-left: `x` grows right, `y` grows down. Stack shapes\nwith `<>` (later ones draw on top), recolour with `fill`, move them with\n`translate`.\n\n","cellType":"ProseCell"},{"cellDirty":false,"cellError":null,"cellId":9,"cellLang":"Haskell","cellOutputs":[{"oiMime":"image/svg+xml","oiOutput":"<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"300\" height=\"300\" viewBox=\"0 0 300 300\"><g fill=\"blue\"><rect x=\"40\" y=\"60\" width=\"220\" height=\"120\"/><\/g><g transform=\"translate(150,120)\"><g fill=\"white\"><circle cx=\"0\" cy=\"0\" r=\"30\"/><\/g><\/g><\/svg>\n"}],"cellSource":"picture (fill blue (rectangle (40, 60) 220 120) <> translate (150, 120) (fill white (circle (0, 0) 30)))\n","cellType":"CodeCell"},{"cellDirty":false,"cellError":null,"cellId":10,"cellLang":"Haskell","cellOutputs":[],"cellSource":"\nThere are more shapes (`line`, `polygon`, `text`) and more ways to dress them up\n(`stroke`, `scale`, `rotate`). The `Sabela.Notebook.Picture` docs list them.\n\n## 3. Animation: a picture that depends on time\n\nPutting behaviours and pictures together gives us the north star from the start of\nthe notebook. An animation is just a picture that depends on time: you write a\nfunction from a time to a picture, hand it to `animate`, and say how many seconds\nit should run for.\n\n","cellType":"ProseCell"},{"cellDirty":false,"cellError":null,"cellId":11,"cellLang":"Haskell","cellOutputs":[{"oiMime":"text/html","oiOutput":"<div><\/div><script>(function(){var frames=[\"<svg xmlns=\\\"http:\\/\\/www.w3.org\\/2000\\/svg\\\" width=\\\"300\\\" height=\\\"300\\\" viewBox=\\\"0 0 300 300\\\"><g fill=\\\"blue\\\"><circle cx=\\\"150\\\" cy=\\\"150\\\" r=\\\"30\\\"\\/><\\/g><\\/svg>\",\"<svg xmlns=\\\"http:\\/\\/www.w3.org\\/2000\\/svg\\\" width=\\\"300\\\" height=\\\"300\\\" viewBox=\\\"0 0 300 300\\\"><g fill=\\\"blue\\\"><circle cx=\\\"150\\\" cy=\\\"152.6661728669403\\\" r=\\\"30\\\"\\/><\\/g><\\/svg>\",\"<svg xmlns=\\\"http:\\/\\/www.w3.org\\/2000\\/svg\\\" width=\\\"300\\\" height=\\\"300\\\" viewBox=\\\"0 0 300 300\\\"><g fill=\\\"blue\\\"><circle cx=\\\"150\\\" cy=\\\"155.32938359387143\\\" r=\\\"30\\\"\\/><\\/g><\\/svg>\",\"<svg xmlns=\\\"http:\\/\\/www.w3.org\\/2000\\/svg\\\" width=\\\"300\\\" height=\\\"300\\\" viewBox=\\\"0 0 300 300\\\"><g fill=\\\"blue\\\"><circle cx=\\\"150\\\" cy=\\\"157.98667333174626\\\" r=\\\"30\\\"\\/><\\/g><\\/svg>\",\"<svg xmlns=\\\"http:\\/\\/www.w3.org\\/2000\\/svg\\\" width=\\\"300\\\" height=\\\"300\\\" viewBox=\\\"0 0 300 300\\\"><g fill=\\\"blue\\\"><circle cx=\\\"150\\\" cy=\\\"160.63508980978511\\\" r=\\\"30\\\"\\/><\\/g><\\/svg>\",\"<svg xmlns=\\\"http:\\/\\/www.w3.org\\/2000\\/svg\\\" width=\ vg>\",\"<svg xmlns=\\\"http:\\/\\/www.w3.org\\/2000\\/svg\\\" width=\\\"300\\\" height=\\\"300\\\" viewBox=\\\"0 0 300 300\\\"><g fill=\\\"red\\\"><circle cx=\\\"220\\\" cy=\\\"150\\\" r=\\\"30\\\"\\/><\\/g><\\/svg>\",\"<svg xmlns=\\\"http:\\/\\/www.w3.org\\/2000\\/svg\\\" width=\\\"300\\\" height=\\\"300\\\" viewBox=\\\"0 0 300 300\\\"><g fill=\\\"red\\\"><circle cx=\\\"220\\\" cy=\\\"150\\\" r=\\\"30\\\"\\/><\\/g><\\/svg>\",\"<svg xmlns=\\\"http:\\/\\/www.w3.org\\/2000\\/svg\\\" width=\\\"300\\\" height=\\\"300\\\" viewBox=\\\"0 0 300 300\\\"><g fill=\\\"red\\\"><circle cx=\\\"220\\\" cy=\\\"150\\\" r=\\\"30\\\"\\/><\\/g><\\/svg>\",\"<svg xmlns=\\\"http:\\/\\/www.w3.org\\/2000\\/svg\\\" width=\\\"300\\\" height=\\\"300\\\" viewBox=\\\"0 0 300 300\\\"><g fill=\\\"red\\\"><circle cx=\\\"220\\\" cy=\\\"150\\\" r=\\\"30\\\"\\/><\\/g><\\/svg>\",\"<svg xmlns=\\\"http:\\/\\/www.w3.org\\/2000\\/svg\\\" width=\\\"300\\\" height=\\\"300\\\" viewBox=\\\"0 0 300 300\\\"><g fill=\\\"red\\\"><circle cx=\\\"220\\\" cy=\\\"150\\\" r=\\\"30\\\"\\/><\\/g><\\/svg>\",\"<svg xmlns=\\\"http:\\/\\/www.w3.org\\/2000\\/svg\\\" width=\\\"300\\\" height=\\\"300\\\" viewBox=\\\"0 0 300 300\\\"><g fill=\\\"red\\\"><circle cx=\\\"220\\\" cy=\\\"150\\\" r=\\\"30\\\"\\/><\\/g><\\/svg>\",\"<svg xmlns=\\\"http:\\/\\/www.w3.org\\/2000\\/svg\\\" width=\\\"300\\\" height=\\\"300\\\" viewBox=\\\"0 0 300 300\\\"><g fill=\\\"red\\\"><circle cx=\\\"220\\\" cy=\\\"150\\\" r=\\\"30\\\"\\/><\\/g><\\/svg>\",\"<svg xmlns=\\\"http:\\/\\/www.w3.org\\/2000\\/svg\\\" width=\\\"300\\\" height=\\\"300\\\" viewBox=\\\"0 0 300 300\\\"><g fill=\\\"red\\\"><circle cx=\\\"220\\\" cy=\\\"150\\\" r=\\\"30\\\"\\/><\\/g><\\/svg>\",\"<svg xmlns=\\\"http:\\/\\/www.w3.org\\/2000\\/svg\\\" width=\\\"300\\\" height=\\\"300\\\" viewBox=\\\"0 0 300 300\\\"><g fill=\\\"red\\\"><circle cx=\\\"220\\\" cy=\\\"150\\\" r=\\\"30\\\"\\/><\\/g><\\/svg>\",\"<svg xmlns=\\\"http:\\/\\/www.w3.org\\/2000\\/svg\\\" width=\\\"300\\\" height=\\\"300\\\" viewBox=\\\"0 0 300 300\\\"><g fill=\\\"red\\\"><circle cx=\\\"220\\\" cy=\\\"150\\\" r=\\\"30\\\"\\/><\\/g><\\/svg>\",\"<svg xmlns=\\\"http:\\/\\/www.w3.org\\/2000\\/svg\\\" width=\\\"300\\\" height=\\\"300\\\" viewBox=\\\"0 0 300 300\\\"><g fill=\\\"red\\\"><circle cx=\\\"220\\\" cy=\\\"150\\\" r=\\\"30\\\"\\/><\\/g><\\/svg>\"];var fps=30;var host=document.currentScript.previousElementSibling;var t0=null;function step(t){if(t0===null)t0=t;var i=Math.floor((t-t0)/1000*fps)%frames.length;host.innerHTML=frames[i];requestAnimationFrame(step);}requestAnimationFrame(step);})();<\/script>\n"}],"cellSource":"animateB 4 (switcher (always (fill blue (circle (80, 150) 30))) (eventFromList [(2, always (fill red (circle (220, 150) 30)))]))\n","cellType":"CodeCell"},{"cellDirty":false,"cellError":null,"cellId":18,"cellLang":"Haskell","cellOutputs":[],"cellSource":"\nThe `Event` and `Behavior` used here are a small teaching model, deliberately\nsimple enough to read through in one sitting. A performance-sensitive interface\nwould reach for push-based machinery underneath, though it exposes the same\nvocabulary you are learning now. Alongside `switcher` you will find `merge` for\ncombining streams, `filterE` for keeping only some events, `stepper` for holding\non to the latest value, and `snapshot` and `tag` for reading a behaviour at the\nmoment an event fires.\n\n## 6. Widgets: interaction\n\nEvents need not be written out by hand. A widget is an on-screen control that\nproduces them as you interact with it, and calling `display` shows the widget and\nreturns its current value. Try dragging the slider below.\n\n","cellType":"ProseCell"},{"cellDirty":false,"cellError":null,"cellId":19,"cellLang":"Haskell","cellOutputs":[{"oiMime":"text/html","oiOutput":"<div id='sw_19_size'><\/div><script>// Shared runtime for Sabela's input widgets (slider, dropdown, checkbox,\n// text input, button). Runs inside a cell's sandboxed output iframe and reports\n// changes to the editor via parent.postMessage, where 22-widget-bridge.js POSTs\n// them to /api/widget. The Haskell side (Sabela.Output.Widgets) embeds this file\n// and emits a tiny sabelaXxx(cfg) bootstrap per widget — no inline event\n// handlers, and values are set via the DOM (not string-concatenated HTML), so a\n// value can never break out of its attribute.\n\n// Report a widget change to the editor. `extra` carries optional fields\n// (e.g. the text-cursor position) merged into the message.\nfunction _sabelaPost(cid, name, value, extra) {\n  var msg = { type: 'widget', cellId: cid, name: name, value: value };\n  if (extra) {\n    for (var k in extra) {\n      if (Object.prototype.hasOwnProperty.call(extra, k)) msg[k] = extra[k];\n    }\n  }\n  parent.postMessage(msg, '*');\n}\n\n// Replace the placeholder div (cfg.elId) with a freshly built control, and\n// register it by name so a kernel→browser update (see below) can set its value.\nfunction _sabelaMount(cfg, el, kind) {\n  var host = document.getElementById(cfg.elId);\n  if (!host) return;\n  host.innerHTML = '';\n  host.appendChild(el);\n  _sabelaControls[cfg.name] = { el: el, kind: kind };\n}\n\n// Controls in this output iframe, keyed by widget name.\nvar _sabelaControls = {};\n\n// Receive a value pushed from the kernel (04-sse.js forwards EvWidget here) and\n// set the matching control. Setting .value/.checked programmatically does NOT\n// fire input/change, so this cannot echo back out through the bridge.\nwindow.addEventListener('message', function (e) {\n  var d = e.data;\n  if (!d || d.type !== 'widgetUpdate') return;\n  var c = _sabelaControls[d.name];\n  if (!c) return;\n  if (c.kind === 'checkbox') c.el.checked = d.value === 'true';\n  else c.el.value = d.value;\n});\n\nfunction sabelaSlider(cfg) {\n  var el = document.createElement('input');\n  el.type = 'range';\n  el.min = cfg.min;\n  el.max = cfg.max;\n  if (cfg.step != null) el.step = cfg.step;\n  el.value = cfg.value;\n  el.addEventListener('input', function () {\n    _sabelaPost(cfg.cid, cfg.name, el.value);\n  });\n  _sabelaMount(cfg, el, 'slider');\n}\n\nfunction sabelaDropdown(cfg) {\n  var el = document.createElement('select');\n  for (var i = 0; i < cfg.options.length; i++) {\n    var opt = document.createElement('option');\n    opt.textContent = cfg.options[i];\n    if (cfg.options[i] === cfg.value) opt.selected = true;\n    el.appendChild(opt);\n  }\n  el.addEventListener('change', function () {\n    _sabelaPost(cfg.cid, cfg.name, el.value);\n  });\n  _sabelaMount(cfg, el, 'dropdown');\n}\n\nfunction sabelaCheckbox(cfg) {\n  var el = document.createElement('input');\n  el.type = 'checkbox';\n  el.checked = !!cfg.checked;\n  el.addEventListener('change', function () {\n    _sabelaPost(cfg.cid, cfg.name, String(el.checked));\n  });\n  _sabelaMount(cfg, el, 'checkbox');\n}\n\nfunction sabelaTextInput(cfg) {\n  var el = document.createElement('input');\n  el.type = 'text';\n  el.value = cfg.value;\n  el.addEventListener('input', function () {\n    _sabelaPost(cfg.cid, cfg.name, el.value, { sel: el.selectionStart });\n  });\n  _sabelaMount(cfg, el, 'text');\n}\n\nfunction sabelaButton(cfg) {\n  var el = document.createElement('button');\n  el.textContent = cfg.label;\n  el.addEventListener('click', function () {\n    _sabelaPost(cfg.cid, cfg.name, 'clicked');\n  });\n  _sabelaMount(cfg, el, 'button');\n}\nsabelaSlider({elId:\"sw_19_size\",cid:19,name:\"size\",min:10,max:120,value:50});<\/script>\n50\n"}],"cellSource":"display (slider \"size\" 50 10 120)\n","cellType":"CodeCell"},{"cellDirty":false,"cellError":null,"cellId":20,"cellLang":"Haskell","cellOutputs":[],"cellSource":"\nA widget is only useful when it drives something. Whenever you change it, Sabela\nre-runs the cells that depend on it. In the next cell the slider's value becomes\nthe size of a circle, so moving the slider resizes the circle straight away.\n\n","cellType":"ProseCell"},{"cellDirty":false,"cellError":null,"cellId":21,"cellLang":"Haskell","cellOutputs":[{"oiMime":"text/html","oiOutput":"<div id='sw_21_size'><\/div><script>// Shared runtime for Sabela's input widgets (slider, dropdown, checkbox,\n// text input, button). Runs inside a cell's sandboxed output iframe and reports\n// changes to the editor via parent.postMessage, where 22-widget-bridge.js POSTs\n// them to /api/widget. The Haskell side (Sabela.Output.Widgets) embeds this file\n// and emits a tiny sabelaXxx(cfg) bootstrap per widget — no inline event\n// handlers, and values are set via the DOM (not string-concatenated HTML), so a\n// value can never break out of its attribute.\n\n// Report a widget change to the editor. `extra` carries optional fields\n// (e.g. the text-cursor position) merged into the message.\nfunction _sabelaPost(cid, name, value, extra) {\n  var msg = { type: 'widget', cellId: cid, name: name, value: value };\n  if (extra) {\n    for (var k in extra) {\n      if (Object.prototype.hasOwnProperty.call(extra, k)) msg[k] = extra[k];\n    }\n  }\n  parent.postMessage(msg, '*');\n}\n\n// Replace the placeholder div (cfg.elId) with a freshly built control, and\n// register it by name so a kernel→browser update (see below) can set its value.\nfunction _sabelaMount(cfg, el, kind) {\n  var host = document.getElementById(cfg.elId);\n  if (!host) return;\n  host.innerHTML = '';\n  host.appendChild(el);\n  _sabelaControls[cfg.name] = { el: el, kind: kind };\n}\n\n// Controls in this output iframe, keyed by widget name.\nvar _sabelaControls = {};\n\n// Receive a value pushed from the kernel (04-sse.js forwards EvWidget here) and\n// set the matching control. Setting .value/.checked programmatically does NOT\n// fire input/change, so this cannot echo back out through the bridge.\nwindow.addEventListener('message', function (e) {\n  var d = e.data;\n  if (!d || d.type !== 'widgetUpdate') return;\n  var c = _sabelaControls[d.name];\n  if (!c) return;\n  if (c.kind === 'checkbox') c.el.checked = d.value === 'true';\n  else c.el.value = d.value;\n});\n\nfunction sabelaSlider(cfg) {\n  var el = document.createElement('input');\n  el.type = 'range';\n  el.min = cfg.min;\n  el.max = cfg.max;\n  if (cfg.step != null) el.step = cfg.step;\n  el.value = cfg.value;\n  el.addEventListener('input', function () {\n    _sabelaPost(cfg.cid, cfg.name, el.value);\n  });\n  _sabelaMount(cfg, el, 'slider');\n}\n\nfunction sabelaDropdown(cfg) {\n  var el = document.createElement('select');\n  for (var i = 0; i < cfg.options.length; i++) {\n    var opt = document.createElement('option');\n    opt.textContent = cfg.options[i];\n    if (cfg.options[i] === cfg.value) opt.selected = true;\n    el.appendChild(opt);\n  }\n  el.addEventListener('change', function () {\n    _sabelaPost(cfg.cid, cfg.name, el.value);\n  });\n  _sabelaMount(cfg, el, 'dropdown');\n}\n\nfunction sabelaCheckbox(cfg) {\n  var el = document.createElement('input');\n  el.type = 'checkbox';\n  el.checked = !!cfg.checked;\n  el.addEventListener('change', function () {\n    _sabelaPost(cfg.cid, cfg.name, String(el.checked));\n  });\n  _sabelaMount(cfg, el, 'checkbox');\n}\n\nfunction sabelaTextInput(cfg) {\n  var el = document.createElement('input');\n  el.type = 'text';\n  el.value = cfg.value;\n  el.addEventListener('input', function () {\n    _sabelaPost(cfg.cid, cfg.name, el.value, { sel: el.selectionStart });\n  });\n  _sabelaMount(cfg, el, 'text');\n}\n\nfunction sabelaButton(cfg) {\n  var el = document.createElement('button');\n  el.textContent = cfg.label;\n  el.addEventListener('click', function () {\n    _sabelaPost(cfg.cid, cfg.name, 'clicked');\n  });\n  _sabelaMount(cfg, el, 'button');\n}\nsabelaSlider({elId:\"sw_21_size\",cid:21,name:\"size\",min:10,max:120,value:50});<\/script>\n"},{"oiMime":"image/svg+xml","oiOutput":"<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"300\" height=\"300\" viewBox=\"0 0 300 300\"><g fill=\"purple\"><circle cx=\"150\" cy=\"150\" r=\"50\"/><\/g><\/svg>\n"}],"cellSource":"display (slider \"size\" 50 10 120) >>= \\s -> picture (fill purple (circle (150, 150) (fromIntegral s)))\n","cellType":"CodeCell"},{"cellDirty":false,"cellError":null,"cellId":22,"cellLang":"Haskell","cellOutputs":[],"cellSource":"\nThere is also `dropdown`, `checkbox`, `textInput`, and `button`.\n\n## 7. Data streams\n\nThe same vocabulary extends to streaming data. You treat the incoming numbers as\nan `Event`, keep a running total of them with `scanlE`, and plot the result with\n`lineChart`.\n\n","cellType":"ProseCell"},{"cellDirty":false,"cellError":null,"cellId":23,"cellLang":"Haskell","cellOutputs":[{"oiMime":"image/svg+xml","oiOutput":"<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"300\" height=\"300\" viewBox=\"0 0 300 300\"><line x1=\"30\" y1=\"30\" x2=\"30\" y2=\"270\" stroke=\"black\"/><line x1=\"30\" y1=\"270\" x2=\"270\" y2=\"270\" stroke=\"black\"/><g stroke-width=\"2\"><polyline points=\"30,270 78,258 126,210 174,198 222,138 270,30\" fill=\"none\" stroke=\"black\"/><\/g><\/svg>\n"}],"cellSource":"picture (lineChart defaultCanvas (occurrencesOf (scanlE (+) 0 (eventFromList (zip [1, 2, 3, 4, 5, 6] [3, 1, 4, 1, 5, 9])))))\n","cellType":"CodeCell"},{"cellDirty":false,"cellError":null,"cellId":24,"cellLang":"Haskell","cellOutputs":[],"cellSource":"\nHere `scanlE (+) 0` keeps the running sum, `occurrencesOf` turns the event back\ninto `(time, value)` points, and `lineChart` scales those points onto the canvas.\nThe very same `scanlE` that drives this small counter would drive a live dashboard\nfed by real data.\n\n## Where to go next\n\nThat is the whole vocabulary. Behaviours are values that vary over time, events\nare things that happen at particular moments, pictures are drawings, and a handful\nof combinators join them together. What makes it hold together is that there is\nreally only one idea underneath: `at`, `integral`, `switcher`, `animate`, and\n`lineChart` are all ways of working with a value that depends on time, which is why\na counter, a falling ball, and a live chart turn out to be the same program with\ndifferent parts slotted in. In each case you describe how time relates to what is\ndrawn and leave the sampling to the renderer, so there is no loop to get wrong and\nplayback stays smooth while Haskell sits idle. It's a simplified version of\nElliott and Hudak's original model.\n","cellType":"ProseCell"}],"nbTitle":"frp-tutorial.md"};

window.__SABELA_MARKDOWN__ = "# Functional Reactive Programming in Sabela\n\nCreating programs that use and produce multimedia requires reasoning about\nwhen things happen and why they happen. For example, a game is a series of\nintricate rules that govern what happens when a character moves forward,\ncollects a valuable item, or interacts with another character.\nWriting this kind of code gets complicated quickly since we think of programming\nas the process of writing sequential computer instructions. All the logic\nin a game is typically written into a large loop that, at every iteration,\nchecks if conditions of interest are met.\n\nFunctional reactive programming promises to make writing such code clearer.\n\nIt does this by describing the things that change over time, and the events that\nhappen, as ordinary values. Instead of maintaining the loop yourself, you write\ndown how each value relates to time and let the runtime do the sampling.\n\nThe model was proposed by Conal Elliott and Paul Hudak when they asked what an\nanimation actually is, and answered with two abstractions: behaviours and events.\n\nA *behaviour* is a value that varies continuously over time.\nAn *event* is something that happens at a moment.\nTheir paper, Functional Reactive Animation, is the root that Yampa,\nreactive-banana, and (more loosely) React and Elm grew from.\n\nThis notebook is that model. It ships with every Sabela notebook, so there is\nnothing to install, and it assumes no Haskell or FRP going in. Run each cell and\nwatch.\n\n## The north star\n\nHere is the destination: a blue circle that slides up and down, in one line.\n\n```haskell\nanimate 3 (\\t -> fill blue (circle (150, 150 + 80 * sin t) 30))\n```\n\n> <!-- scripths:mime text/html -->\n> <div><\/div><script>(function(){var frames=[\"<svg xmlns=\\\"http:\\/\\/www.w3.org\\/2000\\/svg\\\" width=\\\"300\\\" height=\\\"300\\\" viewBox=\\\"0 0 300 300\\\"><g fill=\\\"blue\\\"><circle cx=\\\"150\\\" cy=\\\"150\\\" r=\\\"3 g>\",\"<svg xmlns=\\\"http:\\/\\/www.w3.org\\/2000\\/svg\\\" width=\\\"300\\\" height=\\\"300\\\" viewBox=\\\"0 0 300 300\\\"><g fill=\\\"blue\\\"><circle cx=\\\"150\\\" cy=\\\"186.58181013086497\\\" r=\\\"30\\\"\\/><\\/g><\\/svg>\",\"<svg xmlns=\\\"http:\\/\\/www.w3.org\\/2000\\/svg\\\" width=\\\"300\\\" height=\\\"300\\\" viewBox=\\\"0 0 300 300\\\"><g fill=\\\"blue\\\"><circle cx=\\\"150\\\" cy=\\\"184.1903904187064\\\" r=\\\"30\\\"\\/><\\/g><\\/svg>\",\"<svg xmlns=\\\"http:\\/\\/www.w3.org\\/2000\\/svg\\\" width=\\\"300\\\" height=\\\"300\\\" viewBox=\\\"0 0 300 300\\\"><g fill=\\\"blue\\\"><circle cx=\\\"150\\\" cy=\\\"181.76098490125997\\\" r=\\\"30\\\"\\/><\\/g><\\/svg>\",\"<svg xmlns=\\\"http:\\/\\/www.w3.org\\/2000\\/svg\\\" width=\\\"300\\\" height=\\\"300\\\" viewBox=\\\"0 0 300 300\\\"><g fill=\\\"blue\\\"><circle cx=\\\"150\\\" cy=\\\"179.29629266806\\\" r=\\\"30\\\"\\/><\\/g><\\/svg>\",\"<svg xmlns=\\\"http:\\/\\/www.w3.org\\/2000\\/svg\\\" width=\\\"300\\\" height=\\\"300\\\" viewBox=\\\"0 0 300 300\\\"><g fill=\\\"blue\\\"><circle cx=\\\"150\\\" cy=\\\"176.7990520124724\\\" r=\\\"30\\\"\\/><\\/g><\\/svg>\",\"<svg xmlns=\\\"http:\\/\\/www.w3.org\\/2000\\/svg\\\" width=\\\"300\\\" height=\\\"300\\\" viewBox=\\\"0 0 300 300\\\"><g fill=\\\"blue\\\"><circle cx=\\\"150\\\" cy=\\\"174.27203738942848\\\" r=\\\"30\\\"\\/><\\/g><\\/svg>\",\"<svg xmlns=\\\"http:\\/\\/www.w3.org\\/2000\\/svg\\\" width=\\\"300\\\" height=\\\"300\\\" viewBox=\\\"0 0 300 300\\\"><g fill=\\\"blue\\\"><circle cx=\\\"150\\\" cy=\\\"171.7180563329826\\\" r=\\\"30\\\"\\/><\\/g><\\/svg>\",\"<svg xmlns=\\\"http:\\/\\/www.w3.org\\/2000\\/svg\\\" width=\\\"300\\\" height=\\\"300\\\" viewBox=\\\"0 0 300 300\\\"><g fill=\\\"blue\\\"><circle cx=\\\"150\\\" cy=\\\"169.1399463371186\\\" r=\\\"30\\\"\\/><\\/g><\\/svg>\",\"<svg xmlns=\\\"http:\\/\\/www.w3.org\\/2000\\/svg\\\" width=\\\"300\\\" height=\\\"300\\\" viewBox=\\\"0 0 300 300\\\"><g fill=\\\"blue\\\"><circle cx=\\\"150\\\" cy=\\\"166.5405717032707\\\" r=\\\"30\\\"\\/><\\/g><\\/svg>\",\"<svg xmlns=\\\"http:\\/\\/www.w3.org\\/2000\\/svg\\\" width=\\\"300\\\" height=\\\"300\\\" viewBox=\\\"0 0 300 300\\\"><g fill=\\\"blue\\\"><circle cx=\\\"150\\\" cy=\\\"163.922820358061\\\" r=\\\"30\\\"\\/><\\/g><\\/svg>\"];var fps=30;var host=document.currentScript.previousElementSibling;var t0=null;function step(t){if(t0===null)t0=t;var i=Math.floor((t-t0)/1000*fps)%frames.length;host.innerHTML=frames[i];requestAnimationFrame(step);}requestAnimationFrame(step);})();<\/script>\n\nIt will not run yet, because nothing has been imported. The rest of the notebook\nworks out what `animate`, `time`, and a picture are. Import first.\n\n```haskell\nimport Sabela.Notebook\n```\n\nThe circle above moves now. Behaviours, pictures, animation, in that order.\n\n## 1. Behaviours: values that flow with time\n\nUnderneath, a behaviour is a function from time to a value, but you rarely write\nthat function yourself. You start instead from two behaviours that are given to\nyou: `time`, which is the clock, and `always x`, which holds the value `x` for all\ntime. Every other behaviour is built from these with ordinary arithmetic, and when\nyou want to know what one of them is at a particular instant, you sample it with\n`at`.\n\n```haskell\n(at time 2.5, at (always 7) 99, at (2 * time + 1) 5)\n```\n\n> <!-- scripths:mime text/plain -->\n> (2.5,7,11.0)\n\nThe expression `2 * time + 1` looks like ordinary arithmetic, which is the entire point.\nBecause `time` is a behaviour, the whole expression becomes a behaviour\nas well: a value that changes as the clock advances. Functions like `sin`, `cos`,\nand `sqrt` carry over in the same way, so `sin time` describes a wave. None of it\nis computed until you sample it at some instant.\n\n## 2. Drawing pictures\n\nBefore anything can move it first has to be drawn. A picture is a recipe for a drawing,\nso building one paints nothing on its own. To actually see it, you hand it to `picture`.\n\n```haskell\npicture (fill red (circle (150, 150) 80))\n```\n\n> <!-- scripths:mime image/svg+xml -->\n> <svg xmlns=\"http://www.w3.org/2000/svg\" width=\"300\" height=\"300\" viewBox=\"0 0 300 300\"><g fill=\"red\"><circle cx=\"150\" cy=\"150\" r=\"80\"/><\/g><\/svg>\n\nCoordinates start at the top-left: `x` grows right, `y` grows down. Stack shapes\nwith `<>` (later ones draw on top), recolour with `fill`, move them with\n`translate`.\n\n```haskell\npicture (fill blue (rectangle (40, 60) 220 120) <> translate (150, 120) (fill white (circle (0, 0) 30)))\n```\n\n> <!-- scripths:mime image/svg+xml -->\n> <svg xmlns=\"http://www.w3.org/2000/svg\" width=\"300\" height=\"300\" viewBox=\"0 0 300 300\"><g fill=\"blue\"><rect x=\"40\" y=\"60\" width=\"220\" height=\"120\"/><\/g><g transform=\"translate(150,120)\"><g fill=\"white\"><circle cx=\"0\" cy=\"0\" r=\"30\"/><\/g><\/g><\/svg>\n\nThere are more shapes (`line`, `polygon`, `text`) and more ways to dress them up\n(`stroke`, `scale`, `rotate`). The `Sabela.Notebook.Picture` docs list them.\n\n## 3. Animation: a picture that depends on time\n\nPutting behaviours and pictures together gives us the north star from the start of\nthe notebook. An animation is just a picture that depends on time: you write a\nfunction from a time to a picture, hand it to `animate`, and say how many seconds\nit should run for.\n\n```haskell\nanimate 3 (\\t -> fill blue (circle (150, 150 + 80 * sin t) 30))\n```\n\n> <!-- scripths:mime text/html -->\n> <div><\/div><script>(function(){var frames=[\"<svg xmlns=\\\"http:\\/\\/www.w3.org\\/2000\\/svg\\\" width=\\\"300\\\" height=\\\"300\\\" viewBox=\\\"0 0 300 300\\\"><g fill=\\\"blue\\\"><circle cx=\\\"150\\\" cy=\\\"150\\\" r=\\\"30\\\"\\/><\\/g><\\/svg>\",\"<svg xmlns=\\\"http:\\/\\/www.w3.org\\/2000\\/svg\\\" width=\\\"300\\\" height=\\\"300\\\" viewBox=\\\"0 0 300 300\\\"><g fill=\\\"blue\\\"><circle cx=\\\"150\\\" cy=\\\"152.6661728669403\\\" r=\\\"30\\\"\\/><\\/g><\\/svg>\",\"<svg xmlns=\\\"http s.length;host.innerHTML=frames[i];requestAnimationFrame(step);}requestAnimationFrame(step);})();<\/script>\n\nNotice that there is no simulation loop anywhere here. The relationship between\nspeed and height is stated once, and the renderer takes care of sampling it as\ntime runs on.\n\n## 5. Events and reactivity\n\nWhere behaviours flow continuously, events are discrete and happen at particular\nmoments. An `Event` is a list of those moments paired with values, which you build\nwith `eventFromList`. The combinator that does the most work here is `switcher`,\nwhich follows one behaviour until an event arrives and hands it a new behaviour to\nfollow from then on. In the cell below a blue circle on the left switches to a red\none on the right at `t = 2`.\n\n```haskell\nanimateB 4 (switcher (always (fill blue (circle (80, 150) 30))) (eventFromList [(2, always (fill red (circle (220, 150) 30)))]))\n```\n\n> <!-- scripths:mime text/html -->\n> <div><\/div><script>(function(){var frames=[\"<svg xmlns=\\\"http:\\/\\/www.w3.org\\/2000\\/svg\\\" width=\\\"300\\\" height=\\\"300\\\" viewBox=\\\"0 0 300 300\\\"><g fill=\\\"blue\\\"><circle cx=\\\"80\\\" cy=\\\"150\\\" r=\\\"30\\\"\\/><\\/g><\\/svg>\",\"<svg xmlns=\\\"http:\\/\\/www.w3.org\\/2000\\/svg\\\" width=\\\"300\\\" height=\\\"300\\\" viewBox=\\\"0 0 300 300\\\"><g fill=\\\"blue\\\"><circle cx=\\\"80\\\" cy=\\\"150\\\" r=\\\"30\\\"\\/><\\/g><\\/svg>\",\"<svg xmlns=\\\"http:\\/\\/www.w3.org\\/2000\\/svg\\\" width=\\\"300\\\" height=\\\"300\\\" viewBox=\\\"0 0 300 300\\\"><g fill=\\\"blue\\\"><circle cx=\\\"80\\\" cy=\\\"150\\\" r=\\\"30\\\"\\/><\\/g><\\/svg>\",\"<svg xmlns=\\\"http:\\/\\/www.w3.org\\/2000\\/svg\\\" width=\\\"300\\\" height=\\\"300\\\" viewBox=\\\"0 0 300 300\\\"><g fill=\\\"blue\\\"><circle cx=\\\"80\\\" cy=\\\"150\\\" r=\\\"30\\\"\\/><\\/g><\\/svg>\",\"<svg xmlns=\\\"http:\\/\\/www.w3.org\\/2000\\/svg\\\" width=\\\"300\\\" height=\\\"300\\\" viewBox=\\\"0 0 300 300\\\"><g fill=\\\"blue\\\"><circle cx=\ /g><\\/svg>\",\"<svg xmlns=\\\"http:\\/\\/www.w3.org\\/2000\\/svg\\\" width=\\\"300\\\" height=\\\"300\\\" viewBox=\\\"0 0 300 300\\\"><g fill=\\\"red\\\"><circle cx=\\\"220\\\" cy=\\\"150\\\" r=\\\"30\\\"\\/><\\/g><\\/svg>\",\"<svg xmlns=\\\"http:\\/\\/www.w3.org\\/2000\\/svg\\\" width=\\\"300\\\" height=\\\"300\\\" viewBox=\\\"0 0 300 300\\\"><g fill=\\\"red\\\"><circle cx=\\\"220\\\" cy=\\\"150\\\" r=\\\"30\\\"\\/><\\/g><\\/svg>\"];var fps=30;var host=document.currentScript.previousElementSibling;var t0=null;function step(t){if(t0===null)t0=t;var i=Math.floor((t-t0)/1000*fps)%frames.length;host.innerHTML=frames[i];requestAnimationFrame(step);}requestAnimationFrame(step);})();<\/script>\n\nThe `Event` and `Behavior` used here are a small teaching model, deliberately\nsimple enough to read through in one sitting. A performance-sensitive interface\nwould reach for push-based machinery underneath, though it exposes the same\nvocabulary you are learning now. Alongside `switcher` you will find `merge` for\ncombining streams, `filterE` for keeping only some events, `stepper` for holding\non to the latest value, and `snapshot` and `tag` for reading a behaviour at the\nmoment an event fires.\n\n## 6. Widgets: interaction\n\nEvents need not be written out by hand. A widget is an on-screen control that\nproduces them as you interact with it, and calling `display` shows the widget and\nreturns its current value. Try dragging the slider below.\n\n```haskell\ndisplay (slider \"size\" 50 10 120)\n```\n\n> <!-- scripths:mime text/html -->\n> <div id='sw_19_size'><\/div><script>// Shared runtime for Sabela's input widgets (slider, dropdown, checkbox,\n> // text input, button). Runs inside a cell's sandboxed output iframe and reports\n> // changes to the editor via parent.postMessage, where 22-widget-bridge.js POSTs\n> // them to /api/widget. The Haskell side (Sabela.Output.Widgets) embeds this file\n> // and emits a tiny sabelaXxx(cfg) bootstrap per widget — no inline event\n> // handlers, and values are set via the DOM (not string-concatenated HTML), so a\n> // value can never break out of its attribute.\n> \n> // Report a widget change to the editor. `extra` carries optional fields\n> // (e.g. the text-cursor position) merged into the message.\n> function _sabelaPost(cid, name, value, extra) {\n>   var msg = { type: 'widget', cellId: cid, name: name, value: value };\n>   if (extra) {\n>     for (var k in extra) {\n>       if (Object.prototype.hasOwnProperty.call(extra, k)) msg[k] = extra[k];\n>     }\n>   }\n>   parent.postMessage(msg, '*');\n> }\n> \n> // Replace the placeholder div (cfg.elId) with a freshly built control, and\n> // register it by name so a kernel→browser update (see below) can set its value.\n> function _sabelaMount(cfg, el, kind) {\n>   var host = document.getElementById(cfg.elId);\n>   if (!host) return;\n>   host.innerHTML = '';\n>   host.appendChild(el);\n>   _sabelaControls[cfg.name] = { el: el, kind: kind };\n> }\n> \n> // Controls in this output iframe, keyed by widget name.\n> var _sabelaControls = {};\n> \n> // Receive a value pushed from the kernel (04-sse.js forwards EvWidget here) and\n> // set the matching control. Setting .value/.checked programmatically does NOT\n> // fire input/change, so this cannot echo back out through the bridge.\n> window.addEventListener('message', function (e) {\n>   var d = e.data;\n>   if (!d || d.type !== 'widgetUpdate') return;\n>   var c = _sabelaControls[d.name];\n>   if (!c) return;\n>   if (c.kind === 'checkbox') c.el.checked = d.value === 'true';\n>   else c.el.value = d.value;\n> });\n> \n> function sabelaSlider(cfg) {\n>   var el = document.createElement('input');\n>   el.type = 'range';\n>   el.min = cfg.min;\n>   el.max = cfg.max;\n>   if (cfg.step != null) el.step = cfg.step;\n>   el.value = cfg.value;\n>   el.addEventListener('input', function () {\n>     _sabelaPost(cfg.cid, cfg.name, el.value);\n>   });\n>   _sabelaMount(cfg, el, 'slider');\n> }\n> \n> function sabelaDropdown(cfg) {\n>   var el = document.createElement('select');\n>   for (var i = 0; i < cfg.options.length; i++) {\n>     var opt = document.createElement('option');\n>     opt.textContent = cfg.options[i];\n>     if (cfg.options[i] === cfg.value) opt.selected = true;\n>     el.appendChild(opt);\n>   }\n>   el.addEventListener('change', function () {\n>     _sabelaPost(cfg.cid, cfg.name, el.value);\n>   });\n>   _sabelaMount(cfg, el, 'dropdown');\n> }\n> \n> function sabelaCheckbox(cfg) {\n>   var el = document.createElement('input');\n>   el.type = 'checkbox';\n>   el.checked = !!cfg.checked;\n>   el.addEventListener('change', function () {\n>     _sabelaPost(cfg.cid, cfg.name, String(el.checked));\n>   });\n>   _sabelaMount(cfg, el, 'checkbox');\n> }\n> \n> function sabelaTextInput(cfg) {\n>   var el = document.createElement('input');\n>   el.type = 'text';\n>   el.value = cfg.value;\n>   el.addEventListener('input', function () {\n>     _sabelaPost(cfg.cid, cfg.name, el.value, { sel: el.selectionStart });\n>   });\n>   _sabelaMount(cfg, el, 'text');\n> }\n> \n> function sabelaButton(cfg) {\n>   var el = document.createElement('button');\n>   el.textContent = cfg.label;\n>   el.addEventListener('click', function () {\n>     _sabelaPost(cfg.cid, cfg.name, 'clicked');\n>   });\n>   _sabelaMount(cfg, el, 'button');\n> }\n> sabelaSlider({elId:\"sw_19_size\",cid:19,name:\"size\",min:10,max:120,value:50});<\/script>\n> 50\n\nA widget is only useful when it drives something. Whenever you change it, Sabela\nre-runs the cells that depend on it. In the next cell the slider's value becomes\nthe size of a circle, so moving the slider resizes the circle straight away.\n\n```haskell\ndisplay (slider \"size\" 50 10 120) >>= \\s -> picture (fill purple (circle (150, 150) (fromIntegral s)))\n```\n\n> <!-- scripths:mime text/plain -->\n> <!-- MIME:text/html -->\n> <div id='sw_21_size'><\/div><script>// Shared runtime for Sabela's input widgets (slider, dropdown, checkbox,\n> // text input, button). Runs inside a cell's sandboxed output iframe and reports\n> // changes to the editor via parent.postMessage, where 22-widget-bridge.js POSTs\n> // them to /api/widget. The Haskell side (Sabela.Output.Widgets) embeds this file\n> // and emits a tiny sabelaXxx(cfg) bootstrap per widget — no inline event\n> // handlers, and values are set via the DOM (not string-concatenated HTML), so a\n> // value can never break out of its attribute.\n> \n> // Report a widget change to the editor. `extra` carries optional fields\n> // (e.g. the text-cursor position) merged into the message.\n> function _sabelaPost(cid, name, value, extra) {\n>   var msg = { type: 'widget', cellId: cid, name: name, value: value };\n>   if (extra) {\n>     for (var k in extra) {\n>       if (Object.prototype.hasOwnProperty.call(extra, k)) msg[k] = extra[k];\n>     }\n>   }\n>   parent.postMessage(msg, '*');\n> }\n> \n> // Replace the placeholder div (cfg.elId) with a freshly built control, and\n> // register it by name so a kernel→browser update (see below) can set its value.\n> function _sabelaMount(cfg, el, kind) {\n>   var host = document.getElementById(cfg.elId);\n>   if (!host) return;\n>   host.innerHTML = '';\n>   host.appendChild(el);\n>   _sabelaControls[cfg.name] = { el: el, kind: kind };\n> }\n> \n> // Controls in this output iframe, keyed by widget name.\n> var _sabelaControls = {};\n> \n> // Receive a value pushed from the kernel (04-sse.js forwards EvWidget here) and\n> // set the matching control. Setting .value/.checked programmatically does NOT\n> // fire input/change, so this cannot echo back out through the bridge.\n> window.addEventListener('message', function (e) {\n>   var d = e.data;\n>   if (!d || d.type !== 'widgetUpdate') return;\n>   var c = _sabelaControls[d.name];\n>   if (!c) return;\n>   if (c.kind === 'checkbox') c.el.checked = d.value === 'true';\n>   else c.el.value = d.value;\n> });\n> \n> function sabelaSlider(cfg) {\n>   var el = document.createElement('input');\n>   el.type = 'range';\n>   el.min = cfg.min;\n>   el.max = cfg.max;\n>   if (cfg.step != null) el.step = cfg.step;\n>   el.value = cfg.value;\n>   el.addEventListener('input', function () {\n>     _sabelaPost(cfg.cid, cfg.name, el.value);\n>   });\n>   _sabelaMount(cfg, el, 'slider');\n> }\n> \n> function sabelaDropdown(cfg) {\n>   var el = document.createElement('select');\n>   for (var i = 0; i < cfg.options.length; i++) {\n>     var opt = document.createElement('option');\n>     opt.textContent = cfg.options[i];\n>     if (cfg.options[i] === cfg.value) opt.selected = true;\n>     el.appendChild(opt);\n>   }\n>   el.addEventListener('change', function () {\n>     _sabelaPost(cfg.cid, cfg.name, el.value);\n>   });\n>   _sabelaMount(cfg, el, 'dropdown');\n> }\n> \n> function sabelaCheckbox(cfg) {\n>   var el = document.createElement('input');\n>   el.type = 'checkbox';\n>   el.checked = !!cfg.checked;\n>   el.addEventListener('change', function () {\n>     _sabelaPost(cfg.cid, cfg.name, String(el.checked));\n>   });\n>   _sabelaMount(cfg, el, 'checkbox');\n> }\n> \n> function sabelaTextInput(cfg) {\n>   var el = document.createElement('input');\n>   el.type = 'text';\n>   el.value = cfg.value;\n>   el.addEventListener('input', function () {\n>     _sabelaPost(cfg.cid, cfg.name, el.value, { sel: el.selectionStart });\n>   });\n>   _sabelaMount(cfg, el, 'text');\n> }\n> \n> function sabelaButton(cfg) {\n>   var el = document.createElement('button');\n>   el.textContent = cfg.label;\n>   el.addEventListener('click', function () {\n>     _sabelaPost(cfg.cid, cfg.name, 'clicked');\n>   });\n>   _sabelaMount(cfg, el, 'button');\n> }\n> sabelaSlider({elId:\"sw_21_size\",cid:21,name:\"size\",min:10,max:120,value:50});<\/script>\n> <!-- MIME:image/svg+xml -->\n> <svg xmlns=\"http://www.w3.org/2000/svg\" width=\"300\" height=\"300\" viewBox=\"0 0 300 300\"><g fill=\"purple\"><circle cx=\"150\" cy=\"150\" r=\"50\"/><\/g><\/svg>\n\nThere is also `dropdown`, `checkbox`, `textInput`, and `button`.\n\n## 7. Data streams\n\nThe same vocabulary extends to streaming data. You treat the incoming numbers as\nan `Event`, keep a running total of them with `scanlE`, and plot the result with\n`lineChart`.\n\n```haskell\npicture (lineChart defaultCanvas (occurrencesOf (scanlE (+) 0 (eventFromList (zip [1, 2, 3, 4, 5, 6] [3, 1, 4, 1, 5, 9])))))\n```\n\n> <!-- scripths:mime image/svg+xml -->\n> <svg xmlns=\"http://www.w3.org/2000/svg\" width=\"300\" height=\"300\" viewBox=\"0 0 300 300\"><line x1=\"30\" y1=\"30\" x2=\"30\" y2=\"270\" stroke=\"black\"/><line x1=\"30\" y1=\"270\" x2=\"270\" y2=\"270\" stroke=\"black\"/><g stroke-width=\"2\"><polyline points=\"30,270 78,258 126,210 174,198 222,138 270,30\" fill=\"none\" stroke=\"black\"/><\/g><\/svg>\n\nHere `scanlE (+) 0` keeps the running sum, `occurrencesOf` turns the event back\ninto `(time, value)` points, and `lineChart` scales those points onto the canvas.\nThe very same `scanlE` that drives this small counter would drive a live dashboard\nfed by real data.\n\n## Where to go next\n\nThat is the whole vocabulary. Behaviours are values that vary over time, events\nare things that happen at particular moments, pictures are drawings, and a handful\nof combinators join them together. What makes it hold together is that there is\nreally only one idea underneath: `at`, `integral`, `switcher`, `animate`, and\n`lineChart` are all ways of working with a value that depends on time, which is why\na counter, a falling ball, and a live chart turn out to be the same program with\ndifferent parts slotted in. In each case you describe how time relates to what is\ndrawn and leave the sampling to the renderer, so there is no loop to get wrong and\nplayback stays smooth while Haskell sits idle. It's a simplified version of\nElliott and Hudak's original model.\n";

    <script>
const isStatic = !!window.__SABELA_STATIC__;
const _query = new URLSearchParams(location.search);
// 'notebook' (tutorial) mode shows each code cell's source; 'dashboard'
// (default) shows only prose + outputs. Static shares pin the mode via the
// injected flag; the live editor can request notebook mode with ?mode=notebook.
const renderMode =
  window.__SABELA_RENDER_MODE__ || (_query.get('mode') === 'notebook' ? 'notebook' : 'dashboard');
// ?print=1 — open straight into the browser print dialog (used by the editor's
// "Save as PDF" menu items, which open this page in a new tab).
const autoPrint = _query.get('print') === '1';
const HLJS_LANG = { Haskell: 'haskell', Python: 'python' };
let notebookData = null;

// ── Theme handling (the same picker as the editor; 'sabela-theme' key) ──
const THEMES = [
  { id: 'warm', name: 'Warm Paper', mode: 'light', bg: '#f7f3ec', accent: '#c2674a' },
  { id: 'nord', name: 'Nord', mode: 'dark', bg: '#2e3440', accent: '#88c0d0' },
  { id: 'nord-light', name: 'Nord Light', mode: 'light', bg: '#eceff4', accent: '#5e81ac' },
  { id: 'nord-aurora', name: 'Aurora Purple', mode: 'dark', bg: '#2e3440', accent: '#b48ead' },
  { id: 'nord-ember', name: 'Aurora Ember', mode: 'dark', bg: '#2e3440', accent: '#d08770' },
  { id: 'vscode', name: 'VS Code Dark', mode: 'dark', bg: '#1e1e1e', accent: '#3794ff' },
];
function currentTheme() {
  const t = document.documentElement.dataset.theme;
  return THEMES.some((x) => x.id === t) ? t : 'warm';
}
function cssVar(name, fallback) {
  return (getComputedStyle(document.documentElement).getPropertyValue(name) || fallback).trim();
}
function applyTheme(theme, { persist = true } = {}) {
  document.documentElement.dataset.theme = theme;
  if (persist) {
    localStorage.setItem('sabela-theme', theme);
    window.__sabelaThemePinned = true;
  }
  // Re-render iframes with the current theme colors.
  document.querySelectorAll('iframe[data-last-content]').forEach((f) => {
    if (!f.dataset.lastContent) return;
    if (f.dataset.staticFrame) {
      f.srcdoc = staticSrcdoc(f.dataset.lastContent, f.dataset.iframeKind || 'content', f.id);
      return;
    }
    try {
      const doc = f.contentDocument || f.contentWindow?.document;
      if (!doc) return;
      doc.open();
      const style = f.dataset.iframeKind === 'widget' ? widgetIframeStyle() : iframeContentStyle();
      doc.write(style + f.dataset.lastContent);
      doc.close();
    } catch {}
  });
  markActiveTheme();
}
function markActiveTheme() {
  const cur = currentTheme();
  document
    .querySelectorAll('.theme-menu-item')
    .forEach((el) => el.classList.toggle('active', el.dataset.theme === cur));
}
function buildThemeMenu() {
  let menu = document.getElementById('theme-menu');
  if (menu) return menu;
  menu = document.createElement('div');
  menu.id = 'theme-menu';
  menu.className = 'theme-menu';
  THEMES.forEach((t) => {
    const item = document.createElement('button');
    item.className = 'theme-menu-item';
    item.dataset.theme = t.id;
    item.innerHTML =
      `<span class="sw" style="background:${t.bg}"><i style="background:${t.accent}"></i></span>` +
      `<span class="nm">${t.name}</span>`;
    item.onclick = () => {
      applyTheme(t.id);
      menu.classList.remove('open');
    };
    menu.appendChild(item);
  });
  document.body.appendChild(menu);
  return menu;
}
function openThemePicker() {
  const menu = buildThemeMenu();
  const btn = document.getElementById('theme-toggle');
  if (btn) {
    const r = btn.getBoundingClientRect();
    menu.style.top = r.bottom + 6 + 'px';
    menu.style.right = window.innerWidth - r.right + 'px';
  }
  const open = menu.classList.toggle('open');
  markActiveTheme();
  if (open) {
    setTimeout(() => {
      document.addEventListener(
        'click',
        (e) => {
          if (!menu.contains(e.target) && e.target !== btn && !btn?.contains(e.target))
            menu.classList.remove('open');
        },
        { once: true }
      );
    }, 0);
  }
}
// The header button's onclick is toggleTheme(); keep the name, open the picker.
function toggleTheme() {
  openThemePicker();
}
function iframeContentStyle() {
  const bg = cssVar('--bg-card', '#ffffff');
  const fg = cssVar('--fg', '#0a0a0a');
  const fgHead = cssVar('--fg-heading', '#000000');
  const muted = cssVar('--bg-muted', '#fafafa');
  const border = cssVar('--border', '#e4e4e7');
  const accent = cssVar('--accent', '#0066ff');
  const altRow = `rgba(${cssVar('--accent-rgb', '0,102,255')},0.05)`;
  return `<style>body{background:${bg};color:${fg};font-family:'Geist',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;font-size:15px;margin:0;padding:12px 16px;line-height:1.6;-webkit-font-smoothing:antialiased}img{max-width:100%}a{color:${accent}}table{border-collapse:separate;border-spacing:0;width:100%;border:1px solid ${border};border-radius:8px;overflow:hidden;margin:14px 0;font-size:14px}th,td{padding:10px 14px;text-align:left;border-bottom:1px solid ${border}}tr:last-child td{border-bottom:none}th{background:${muted};color:${fgHead};font-weight:600}tr:nth-child(even) td{background:${altRow}}input,select,button{font-family:inherit;font-size:14px;accent-color:${accent}}</style>`;
}
function widgetIframeStyle() {
  const fg = cssVar('--fg', '#0a0a0a');
  const fgDim = cssVar('--fg-dim', '#71717a');
  const accent = cssVar('--accent', '#0066ff');
  return `<style>body{background:transparent;color:${fg};font-family:'JetBrains Mono',ui-monospace,monospace;font-size:14px;margin:0;padding:6px 12px;line-height:1.2;font-variant-ligatures:none;font-feature-settings:"calt" 0,"liga" 0}input,select{font-family:inherit;font-size:14px;accent-color:${accent};vertical-align:middle}button{font-family:inherit;font-size:14px;cursor:pointer;accent-color:${accent};vertical-align:middle}label{font-weight:600;font-size:13px;color:${fgDim};display:inline-block;margin-right:8px;vertical-align:middle}</style>`;
}
// ── Static-export iframe: opaque-origin sandbox + in-document CSP ──
// In a shared/offline export we still run a script-drawn widget so its plot
// renders, but sandbox='allow-scripts' (NO allow-same-origin) gives the frame an
// opaque origin that cannot read this page (the embedded notebook JSON), cookies,
// or storage; the meta-CSP allows charting libs from trusted CDNs (cdnjs,
// jsdelivr) but keeps connect-src closed, so a plot can draw yet can't
// exfiltrate the page. 'unsafe-eval' is required because Vega compiles its
// dataflow expressions at runtime via the Function() constructor; it adds
// little risk here since 'unsafe-inline' already runs arbitrary script and the
// opaque origin + closed connect-src block any reads or exfiltration. Because
// the frame is cross-origin we cannot read its height, so it reports its own
// via postMessage.
const STATIC_CSP =
  "<meta http-equiv=\"Content-Security-Policy\" content=\"default-src 'none'; script-src 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; style-src 'unsafe-inline'; img-src data:; base-uri 'none'; form-action 'none'; frame-src 'none'\">";
let __staticFrameSeq = 0;
function staticSrcdoc(content, kind, id) {
  const style = kind === 'widget' ? widgetIframeStyle() : iframeContentStyle();
  const reporter =
    '<scr' +
    "ipt>(function(){function r(){try{parent.postMessage({__sabelaH:document.documentElement.scrollHeight,__sabelaId:'" +
    id +
    "'},'*')}catch(e){}}requestAnimationFrame(function(){r();setTimeout(r,60)})})();</scr" +
    'ipt>';
  return STATIC_CSP + style + content + reporter;
}
function mountStaticFrame(container, content, kind) {
  const id = 'sframe' + __staticFrameSeq++;
  const iframe = document.createElement('iframe');
  iframe.id = id;
  iframe.setAttribute('sandbox', 'allow-scripts');
  if (kind === 'widget') iframe.style.pointerEvents = 'none';
  iframe.style.height = (kind === 'widget' ? 60 : 80) + 'px';
  iframe.dataset.iframeKind = kind;
  iframe.dataset.lastContent = content;
  iframe.dataset.staticFrame = '1';
  iframe.srcdoc = staticSrcdoc(content, kind, id);
  container.appendChild(iframe);
}
window.addEventListener('message', (e) => {
  const d = e.data;
  if (d && typeof d.__sabelaH === 'number' && d.__sabelaId) {
    const el = document.getElementById(d.__sabelaId);
    if (el && el.dataset.staticFrame) el.style.height = Math.max(32, d.__sabelaH) + 'px';
  }
});
// Initial sync (renders iframes with the active theme).
applyTheme(currentTheme(), { persist: false });
// ── Initialization ───────────────────────────────────────────────
async function init() {
  if (isStatic) {
    notebookData = window.__SABELA_STATIC__;
    document.getElementById('edit-link').style.display = 'none';
    document.getElementById('export-btn').style.display = 'none';
  } else {
    const resp = await fetch('/api/notebook');
    notebookData = await resp.json();
  }
  renderDashboard(notebookData);
  if (renderMode === 'notebook') setupDownloadMd();
  if (!isStatic) connectSSE();
  // Opened with ?print=1 — let layout settle (iframes report heights, fonts
  // load), then drop straight into the print dialog.
  if (autoPrint) requestAnimationFrame(() => setTimeout(printToPdf, 300));
}

// In notebook (tutorial) mode, offer the notebook source for download so a
// reader can upload it into their own Sabela workspace and run it.
function setupDownloadMd() {
  const md = window.__SABELA_MARKDOWN__;
  const actions = document.getElementById('header-actions');
  if (!md || !actions || document.getElementById('dl-md-btn')) return;
  const btn = document.createElement('button');
  btn.id = 'dl-md-btn';
  btn.textContent = 'Download .md';
  btn.title = 'Download the notebook source — upload it into your own Sabela workspace to run it';
  btn.addEventListener('click', () => {
    const title = (notebookData && notebookData.nbTitle) || 'notebook.md';
    const name = /\.md$/.test(title) ? title.split('/').pop() : 'notebook.md';
    const blob = new Blob([md], { type: 'text/markdown' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = name;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => {
      URL.revokeObjectURL(a.href);
      a.remove();
    }, 0);
  });
  actions.insertBefore(btn, actions.firstChild);
}
// ── Print to PDF ─────────────────────────────────────────────────
// Browsers print an <iframe> as one atomic box: a tall frame is clipped at the
// page edge, not paginated. Content outputs (e.g. dataframe tables) live in
// iframes, so before printing we swap each one for inline, script-stripped DOM
// that flows across pages. SVG/markdown/image/JSON/plain outputs are already
// inline and need no help; short widget iframes are left as-is.

// Strip <script> elements and on*= handlers, then return the safe HTML. Inlining
// runs in this page's origin (unlike the sandboxed iframe), so for untrusted
// static shares this prevents the output HTML from executing.
function sanitizeForPrint(html) {
  const tpl = document.createElement('template');
  tpl.innerHTML = html;
  tpl.content.querySelectorAll('script').forEach((s) => s.remove());
  tpl.content.querySelectorAll('*').forEach((el) => {
    for (const attr of [...el.attributes]) {
      if (/^on/i.test(attr.name)) el.removeAttribute(attr.name);
    }
  });
  return tpl.innerHTML;
}

// Replace each content iframe with an inline .print-inline div; return undo fns.
function inlineContentFramesForPrint() {
  const frames = [...document.querySelectorAll('iframe[data-last-content]')].filter(
    (f) => f.dataset.iframeKind !== 'widget'
  );
  const restore = [];
  for (const f of frames) {
    const div = document.createElement('div');
    div.className = 'print-inline';
    div.innerHTML = sanitizeForPrint(f.dataset.lastContent || '');
    f.style.display = 'none';
    f.parentNode.insertBefore(div, f);
    restore.push(() => {
      div.remove();
      f.style.display = '';
    });
  }
  return restore;
}

function printToPdf() {
  const restore = inlineContentFramesForPrint();
  const cleanup = () => {
    restore.forEach((r) => r());
    window.removeEventListener('afterprint', cleanup);
  };
  window.addEventListener('afterprint', cleanup);
  requestAnimationFrame(() => window.print());
}
// ── Render dashboard ─────────────────────────────────────────────
function renderDashboard(nb) {
  document.getElementById('dashboard-title').textContent = formatTitle(nb.nbTitle);
  document.title = formatTitle(nb.nbTitle) + ' — Sabela Dashboard';

  const main = document.getElementById('main-content');
  main.innerHTML = '';

  const cells = nb.nbCells || [];
  for (const cell of cells) {
    renderCellOutputs(main, cell, null);
  }
}

// Render KaTeX inside a markdown source before handing to marked, so
// $...$ / $$...$$ blocks survive marked's underscore/star handling.
// Safe no-op if katex isn't available.
function renderMarkdownWithMath(src) {
  let s = src || '';
  if (typeof katex !== 'undefined') {
    s = s.replace(/\$\$([\s\S]+?)\$\$/g, (_, tex) => {
      try {
        return katex.renderToString(tex.trim(), { displayMode: true, throwOnError: false });
      } catch (_e) {
        return _;
      }
    });
    s = s.replace(/(^|[^\\$])\$([^\$\n]+?)\$(?!\d)/g, (_, pre, tex) => {
      try {
        return pre + katex.renderToString(tex, { displayMode: false, throwOnError: false });
      } catch (_e) {
        return _;
      }
    });
  }
  return marked.parse(s);
}

// ── Render a single cell's outputs into the container ────────────
function renderCellOutputs(container, cell, insertBefore) {
  if (cell.cellType === 'ProseCell') {
    const section = document.createElement('div');
    section.className = 'dash-section';
    section.dataset.cellId = cell.cellId;
    section.innerHTML = renderMarkdownWithMath(cell.cellSource || '');
    section.querySelectorAll('table').forEach((t) => {
      const w = document.createElement('div');
      w.style.overflowX = 'auto';
      t.parentNode.insertBefore(w, t);
      w.appendChild(t);
    });
    container.insertBefore(section, insertBefore);
    return;
  }

  // CodeCell — in notebook (tutorial) mode, show the source above its outputs.
  if (renderMode === 'notebook' && (cell.cellSource || '').trim()) {
    const codeWrap = document.createElement('div');
    codeWrap.className = 'dash-code';
    codeWrap.dataset.cellId = cell.cellId;
    const pre = document.createElement('pre');
    const codeEl = document.createElement('code');
    codeEl.className = 'hljs';
    const src = cell.cellSource || '';
    const hl = HLJS_LANG[cell.cellLang || 'Haskell'];
    if (hl && window.hljs && hljs.getLanguage(hl)) {
      codeEl.innerHTML = hljs.highlight(src, { language: hl }).value;
    } else {
      codeEl.textContent = src;
    }
    pre.appendChild(codeEl);
    codeWrap.appendChild(pre);
    container.insertBefore(codeWrap, insertBefore);
  }

  // CodeCell — render all outputs inline in order
  const outputs = cell.cellOutputs || [];
  const merged = mergeHtmlOutputs(outputs);
  for (const o of merged) {
    if (!o.oiOutput || !o.oiOutput.trim()) continue;
    const isWidget = classifyOutput(o) === 'widget';
    const card = document.createElement('div');
    card.className = isWidget ? 'dash-widget' : 'dash-output';
    card.dataset.cellId = cell.cellId;

    if (isWidget) {
      renderWidgetOutput(card, o, cell.cellId);
    } else {
      renderOutput(card, o.oiOutput, o.oiMime);
    }
    container.insertBefore(card, insertBefore);
  }

  // Show errors
  if (cell.cellError && cell.cellError.trim()) {
    const errEl = document.createElement('div');
    errEl.className = 'dash-error';
    errEl.dataset.cellId = cell.cellId;
    errEl.textContent = cell.cellError;
    container.insertBefore(errEl, insertBefore);
  }
}

// ── Output classification ────────────────────────────────────────
function classifyOutput(item) {
  if (
    item.oiMime === 'text/html' &&
    item.oiOutput &&
    item.oiOutput.includes('parent.postMessage')
  ) {
    return 'widget';
  }
  return 'content';
}

// ── Merge consecutive HTML outputs (non-widget only) ─────────────
function mergeHtmlOutputs(outputs) {
  const merged = [];
  for (const o of outputs) {
    const isWidget = classifyOutput(o) === 'widget';
    const last = merged[merged.length - 1];
    if (
      !isWidget &&
      o.oiMime === 'text/html' &&
      last &&
      last.oiMime === 'text/html' &&
      classifyOutput(last) !== 'widget'
    ) {
      last.oiOutput += '\n' + o.oiOutput;
    } else {
      merged.push({ oiMime: o.oiMime, oiOutput: o.oiOutput });
    }
  }
  return merged;
}
// ── Render a content output ──────────────────────────────────────
function renderOutput(container, content, mime) {
  if (mime === 'text/html') {
    if (isStatic) {
      mountStaticFrame(container, content, 'content');
      return;
    }
    const iframe = document.createElement('iframe');
    iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin');
    iframe.style.visibility = 'hidden';
    container.appendChild(iframe);
    requestAnimationFrame(() => {
      const doc = iframe.contentDocument || iframe.contentWindow?.document;
      if (!doc) return;
      iframe.dataset.lastContent = content;
      doc.open();
      iframe.onload = () => {
        iframe.style.height = Math.max(60, doc.body.scrollHeight + 20) + 'px';
        iframe.style.visibility = '';
      };
      doc.write(iframeContentStyle() + content);
      doc.close();
    });
  } else if (mime === 'text/markdown') {
    const div = document.createElement('div');
    div.className = 'mime-markdown';
    div.innerHTML = renderMarkdownWithMath(content);
    div.querySelectorAll('table').forEach((t) => {
      const w = document.createElement('div');
      w.style.overflowX = 'auto';
      t.parentNode.insertBefore(w, t);
      w.appendChild(t);
    });
    container.appendChild(div);
  } else if (mime === 'image/svg+xml') {
    const div = document.createElement('div');
    div.className = 'mime-svg';
    div.innerHTML = content;
    container.appendChild(div);
  } else if (mime.startsWith('image/') && mime.includes('base64')) {
    const div = document.createElement('div');
    div.className = 'mime-image';
    const mimeClean = mime.replace(';base64', '');
    div.innerHTML = '<img src="data:' + mimeClean + ';base64,' + content.trim() + '" />';
    container.appendChild(div);
  } else if (mime === 'application/json') {
    const div = document.createElement('div');
    div.className = 'mime-json';
    try {
      div.textContent = JSON.stringify(JSON.parse(content), null, 2);
    } catch {
      div.textContent = content;
    }
    container.appendChild(div);
  } else if (mime === 'text/latex') {
    const div = document.createElement('div');
    div.className = 'mime-latex';
    try {
      katex.render(content, div, { displayMode: true, throwOnError: false });
    } catch {
      div.textContent = content;
    }
    container.appendChild(div);
  } else {
    const div = document.createElement('div');
    div.className = 'mime-plain';
    div.textContent = content;
    container.appendChild(div);
  }
}

// ── Render widget inline ─────────────────────────────────────────
function renderWidgetOutput(container, output, cellId) {
  if (isStatic) {
    // Script-drawn widgets (e.g. the scatter <canvas>) need their script to run to
    // render at all — do it in the opaque-origin, network-dead sandbox (see
    // mountStaticFrame), inert via pointer-events:none. Form controls have no such
    // need and stay as greyed-out, script-stripped placeholders.
    if (/<canvas|<script/i.test(output.oiOutput)) {
      mountStaticFrame(container, output.oiOutput, 'widget');
      return;
    }
    const wrapper = document.createElement('div');
    wrapper.className = 'static-widget';
    let cleaned = output.oiOutput
      .replace(/\s*on\w+="[^"]*"/g, '')
      .replace(/<(input|select|button)/gi, '<$1 disabled');
    wrapper.innerHTML = cleaned;
    container.appendChild(wrapper);
    return;
  }

  const iframe = document.createElement('iframe');
  iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin');
  iframe.style.visibility = 'hidden';
  container.appendChild(iframe);

  requestAnimationFrame(() => {
    const doc = iframe.contentDocument || iframe.contentWindow?.document;
    if (!doc) return;
    iframe.dataset.lastContent = output.oiOutput;
    iframe.dataset.iframeKind = 'widget';
    doc.open();
    iframe.onload = () => {
      iframe.style.height = Math.max(32, doc.body.scrollHeight) + 'px';
      iframe.style.visibility = '';
    };
    doc.write(widgetIframeStyle() + output.oiOutput);
    doc.close();
  });
}
// ── SSE (live mode only) ─────────────────────────────────────────
function connectSSE() {
  const evtSource = new EventSource('/api/events');
  evtSource.onmessage = (e) => {
    const ev = JSON.parse(e.data);
    switch (ev.type) {
      case 'cellUpdating':
        showStatus('Running...', true);
        break;
      case 'cellResult':
        updateDashboardCell(ev.cellId, ev.outputs || [], ev.error);
        break;
      case 'executionDone':
        hideStatus();
        break;
      case 'sessionStatus':
        if (ev.message === 'ready') hideStatus();
        else showStatus(ev.message, true);
        break;
    }
  };
  evtSource.onerror = () => {
    showStatus('Disconnected', false);
  };
}

// ── Update a cell in the dashboard ───────────────────────────────
function updateDashboardCell(cellId, outputs, error) {
  if (!notebookData) return;
  const cell = (notebookData.nbCells || []).find((c) => c.cellId === cellId);
  if (!cell) return;

  cell.cellOutputs = outputs;
  cell.cellError = error || null;

  // Remove only this cell's existing DOM nodes
  const main = document.getElementById('main-content');
  main.querySelectorAll(`[data-cell-id="${cellId}"]`).forEach((el) => el.remove());

  // Find the next cell's first DOM node to insert before
  const cells = notebookData.nbCells;
  const cellIndex = cells.indexOf(cell);
  let insertBefore = null;
  for (let j = cellIndex + 1; j < cells.length; j++) {
    const nextNode = main.querySelector(`[data-cell-id="${cells[j].cellId}"]`);
    if (nextNode) {
      insertBefore = nextNode;
      break;
    }
  }

  // Re-render just this cell
  renderCellOutputs(main, cell, insertBefore);
}

// ── Widget postMessage bridge (live mode) ────────────────────────
const _widgetTimers = new Map();
window.addEventListener('message', (e) => {
  if (isStatic) return;
  const d = e.data;
  if (d && d.type === 'widget') {
    const key = d.cellId + ':' + d.name;
    clearTimeout(_widgetTimers.get(key));
    _widgetTimers.set(
      key,
      setTimeout(() => {
        _widgetTimers.delete(key);
        fetch('/api/widget', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ wuCellId: d.cellId, wuName: d.name, wuValue: d.value }),
        });
      }, 300)
    );
  }
});

// ── Status indicator ─────────────────────────────────────────────
function showStatus(msg, running) {
  const el = document.getElementById('status-indicator');
  el.textContent = msg;
  el.className = 'dash-status visible' + (running ? ' running' : '');
}
function hideStatus() {
  document.getElementById('status-indicator').className = 'dash-status';
}

// ── Export button (live mode) ────────────────────────────────────
function exportDashboard() {
  window.open('/api/export/dashboard', '_blank');
}

// ── Title formatting ─────────────────────────────────────────────
function formatTitle(path) {
  if (!path) return 'Dashboard';
  const name = path
    .split('/')
    .pop()
    .replace(/\.[^/.]+$/, '');
  return name.charAt(0).toUpperCase() + name.slice(1);
}

// ── Go ───────────────────────────────────────────────────────────
init();
    </script>
