/* ── Header ────────────────────────────────── */
.dashboard-header {
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 24px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  backdrop-filter: saturate(120%) blur(6px);
}
.dashboard-header h1 {
  font-family: var(--font-mono);
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0.3px;
  color: var(--fg-heading);
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.header-actions {
  display: flex;
  gap: 8px;
  align-items: center;
}
.header-actions a,
.header-actions button {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 500;
  padding: 6px 12px;
  border-radius: 6px;

  background: transparent;
  color: var(--fg-dim);
  cursor: pointer;
  text-decoration: none;
  transition: all 0.15s;
}
.header-actions a:hover,
.header-actions button:hover {

  color: var(--accent);
}
.header-actions .icon-btn {
  width: 30px;
  height: 30px;
  padding: 0;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border: 1px solid transparent;
  color: var(--fg-dim);
}
.header-actions .icon-btn:hover {
  background: var(--bg-muted);
  color: var(--fg-heading);
  border-color: transparent;
}
.icon-svg {
  width: 16px;
  height: 16px;
  stroke: currentColor;
  stroke-width: 2;
  fill: none;
  stroke-linecap: round;
  stroke-linejoin: round;
  flex-shrink: 0;
}

  display: none;
  flex-direction: column;
  min-width: 200px;
  padding: 6px;

}

  font-size: 13px;
  text-align: left;
  cursor: pointer;
}
.theme-menu-item:hover {

}
.theme-menu-item.active {
  color: var(--accent);

}

  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.theme-menu-item .sw i {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}
.theme-menu-item.active .nm::after {
  content: ' ✓';
  color: var(--accent);
}
/* ── Main content ──────────────────────────── */
.dashboard-main {
  padding: 32px 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.dashboard-content {
  width: 100%;
  max-width: var(--main-max-w);
}

/* ── Sections (prose cells) ────────────────── */
.dash-section {
  margin-bottom: 24px;
}
.dash-section h1 {
  font-size: 28px;
  font-weight: 700;
  color: var(--fg-heading);
  margin-bottom: 8px;
}
.dash-section h2 {
  font-size: 22px;
  font-weight: 600;
  color: var(--fg-heading);
  margin-bottom: 6px;
}
.dash-section h3 {
  font-size: 18px;
  font-weight: 600;
  color: var(--fg-heading);
  margin-bottom: 4px;
}
.dash-section p {
  margin-bottom: 12px;
}
/* padding-left (not margin-left) so nested lists compound and markers
     have room after the global "* { padding:0 }" reset. */
.dash-section ul,
.dash-section ol,
.dash-output .mime-markdown ul,
.dash-output .mime-markdown ol {
  margin: 0 0 12px;
  padding-left: 1.5em;
}
.dash-section li,
.dash-output .mime-markdown li {
  margin: 3px 0;
}
.dash-section li > ul,
.dash-section li > ol,
.dash-output .mime-markdown li > ul,
.dash-output .mime-markdown li > ol {
  margin: 3px 0 5px;
}
.dash-section ul,
.dash-output .mime-markdown ul {
  list-style: disc;
}
.dash-section ul ul,
.dash-output .mime-markdown ul ul {
  list-style: circle;
}
.dash-section ul ul ul,
.dash-output .mime-markdown ul ul ul {
  list-style: square;
}
.dash-section ol,
.dash-output .mime-markdown ol {
  list-style: decimal;
}
.dash-section a {
  color: var(--accent);
}
.dash-section code {
  font-family: var(--font-mono);
  font-size: 14px;
  background: var(--bg-muted);
  padding: 2px 6px;
  border-radius: 4px;
}
.dash-section pre {
  font-family: var(--font-mono);
  font-size: 14px;
  background: var(--bg-muted);
  padding: 12px 16px;
  border-radius: var(--radius);
  overflow-x: auto;
  margin-bottom: 12px;
}
/* ── Tables (prose + markdown outputs) ─────── */
.dash-section table,
.dash-output .mime-markdown table {
  border-collapse: separate;
  border-spacing: 0;
  width: 100%;
  margin: 14px 0;
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  font-size: 14px;
  box-shadow: var(--shadow);
  background: var(--bg-card);
}
.dash-section th,
.dash-section td,
.dash-output .mime-markdown th,
.dash-output .mime-markdown td {
  padding: 10px 14px;
  text-align: left;
  border-bottom: 1px solid var(--border-light);
}
.dash-section tr:last-child td,
.dash-output .mime-markdown tr:last-child td {
  border-bottom: none;
}
.dash-section th,
.dash-output .mime-markdown th {
  background: var(--bg-muted);
  color: var(--fg-heading);
  font-weight: 600;
  font-size: 13px;
  letter-spacing: 0.2px;
  border-bottom: 1px solid var(--border);
}
.dash-section tr:nth-child(even) td,
.dash-output .mime-markdown tr:nth-child(even) td {
  background: rgba(var(--accent-rgb), 0.04);
}
.dash-section tbody tr:hover td,
.dash-output .mime-markdown tbody tr:hover td {
  background: rgba(var(--accent-rgb), 0.08);
}
/* Right-align numeric-looking columns automatically isn't possible without JS;
     leave default alignment but tighten cell typography. */
.dash-section td,
.dash-output .mime-markdown td {
  font-variant-numeric: tabular-nums;
}
.dash-section blockquote {
  border-left: 3px solid var(--accent);
  padding: 8px 16px;
  color: var(--fg-dim);
  margin-bottom: 12px;
}
/* ── Output cards ──────────────────────────── */
.dash-output {
  margin-bottom: 24px;
  border: 1px solid var(--border-light);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
}
.dash-output iframe {
  width: 100%;
  border: none;
  display: block;
  min-height: 60px;
}
.dash-output .mime-svg {
  padding: 8px;
}
.dash-output .mime-svg svg {
  max-width: 100%;
  height: auto;
}
.dash-output .mime-image img {
  max-width: 100%;
  display: block;
}
.dash-output .mime-json {
  font-family: var(--font-mono);
  font-size: 13px;
  background: var(--bg-muted);
  padding: 12px 16px;
  white-space: pre-wrap;
  word-break: break-word;
}
.dash-output .mime-markdown {
  padding: 16px;
}
.dash-output .mime-latex {
  padding: 16px;
  text-align: center;
}
.dash-output .mime-plain {
  font-family: var(--font-mono);
  font-size: 14px;
  padding: 12px 16px;
  white-space: pre-wrap;
}

/* ── Inline widgets ────────────────────────── */
.dash-widget {
  margin-bottom: 8px;
  border-radius: 6px;
  overflow: hidden;
  background: var(--bg-muted);
}
.dash-widget iframe {
  width: 100%;
  border: none;
  display: block;
  height: 36px;
}
.dash-widget .static-widget {
  font-size: 14px;
  padding: 6px 12px;
}
.dash-widget .static-widget input[disabled],
.dash-widget .static-widget select[disabled] {
  opacity: 0.7;
  cursor: default;
}
/* ── Error display ─────────────────────────── */
.dash-error {
  margin-bottom: 24px;
  padding: 12px 16px;
  border: 1px solid var(--err-border);
  border-radius: var(--radius);
  background: var(--err-bg);
  color: var(--err-fg);
  font-family: var(--font-mono);
  font-size: 13px;
  white-space: pre-wrap;
}

/* ── Status indicator ──────────────────────── */
.dash-status {
  position: fixed;
  bottom: 16px;
  right: 16px;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  background: var(--bg-muted);
  border: 1px solid var(--border);
  color: var(--fg-dim);
  display: none;
}
.dash-status.visible {
  display: block;
}
.dash-status.running {
  color: var(--accent);
  border-color: var(--accent);
}

/* ── Responsive ────────────────────────────── */
@media (max-width: 768px) {
  .dashboard-main {
    padding: 16px;
  }
  .dashboard-content {
    max-width: 100%;
  }
}
/* ── Print / Save as PDF ───────────────────────
     Force a light, ink-friendly page regardless of the on-screen theme, hide
     the app chrome, and make tall outputs paginate cleanly. Content iframes are
     swapped for inline .print-inline DOM by printToPdf() before this applies. */
@media print {
  :root,
  :root[data-theme='dark'] {
    --bg: #ffffff;
    --bg-muted: #f6f6f6;
    --bg-card: #ffffff;
    --fg: #111111;
    --fg-dim: #555555;
    --fg-heading: #000000;
    --accent: #0050d0;
    --accent-rgb: 0, 80, 208;
    --border: #cccccc;
    --border-light: #e0e0e0;
    --shadow: none;
  }
  html,
  body {
    height: auto;
    overflow: visible;
  }
  body {
    font-size: 11pt;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  @page {
    margin: 18mm 14mm;
  }

  /* Hide app chrome — only prose + outputs (and code, in notebook mode) print. */
  .dashboard-header,
  .dash-status {
    display: none !important;
  }
  .dashboard-main {
    padding: 0;
    display: block;
  }
  .dashboard-content {
    max-width: 100%;
  }

  * {
    box-shadow: none !important;
  }

  /* Keep small blocks whole; let tall tables split with a repeating header. */
  .dash-section,
  .dash-code,
  .dash-widget,
  .dash-error,
  .dash-output:not(:has(table)) {
    break-inside: avoid;
  }
  .dash-output,
  .print-inline {
    break-inside: auto;
  }
  table {
    break-inside: auto;
  }
  thead {
    display: table-header-group;
  }
  tr,
  img,
  svg {
    break-inside: avoid;
  }
  h1,
  h2,
  h3 {
    break-after: avoid;
  }

  /* Wrap long lines so nothing clips off the right edge of the page. */
  .dash-code code,
  .dash-output .mime-plain,
  .dash-output .mime-json,
  .print-inline pre {
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* Inlined HTML outputs: base typography + reuse the prose table styling. */
  .print-inline {
    font-size: 11pt;

    <script>
window.__SABELA_STATIC__ = {"nbCells":[{"cellDirty":false,"cellError":null,"cellId":46,"cellLang":"Haskell","cellOutputs":[],"cellSource":"# What is Constructive Solid Geometry?\n\nConstructive Solid Geometry, or CSG, is a class of 3D modelling techniques.\n\nCSG involves taking primitive shapes, like spheres, cylinders and cubes, transforming them into a position, and then combining them with \"Boolean operators\", like intersection, union, and difference (or subtraction).\n\nThe [Wikipedia article on Constructive Solid Geometry](https://en.wikipedia.org/wiki/Constructive_solid_geometry) uses this diagram to explain it. \n\n![](https://raw.githubusercontent.com/joe-warren/sabela/0b87c7bc183323cc38db5e5a2f20a500473a425a/waterfall/csg_tree.png)\n\nIn this notebook I'm going to break this diagram down, using a Haskell library called [Waterfall-CAD](https://hackage.haskell.org/package/waterfall-cad).","cellType":"ProseCell"},{"cellDirty":false,"cellError":null,"cellId":47,"cellLang":"Haskell","cellOutputs":[],"cellSource":"First we're going to write a little bit of code to let us view Waterfall-CAD solids in a Sabela notebook; this uses the [`modelviewer.dev`](http://modelviewer.dev) JavaScript library. You should feel free to ignore this code block.","cellType":"ProseCell"},{"cellDirty":false,"cellError":null,"cellId":48,"cellLang":"Haskell","cellOutputs":[],"cellSource":"-- cabal: build-depends: waterfall-cad, linear, random\n-- cabal: extra-lib-dirs: /opt/homebrew/opt/opencascade/lib\n-- cabal: extra-include-dirs: /opt/homebrew/opt/opencascade/include/opencascade\n-- The extra-*-dirs are macOS/Homebrew paths for OpenCASCADE (waterfall-cad's C++\n-- backend); on Linux point them at your distro's opencascade install instead.\nimport qualified Waterfall as W\nimport Linear\nimport System.Random (randomRIO)\n\nassetBase :: String\nassetBase = \"https://raw.githubusercontent.com/joe-warren/sabela/0b87c7bc183323cc38db5e5a2f20a500473a425a/waterfall/\"\n\nmodelDir :: String\nmodelDir = \"examples/data/waterfall/models\"\n\nviewerHtml :: String -> String\nviewerHtml modelUrl =\n  unlines\n    [ \"<script type='module' src='https://ajax.googleapis.com/ajax/libs/model-viewer/4.3.1/model-viewer.min.js'><\/script>\"\n    , \"<model-viewer\"\n    , \"  src='\" <> modelUrl <> \"'\"\n    , \"  environment-image='\" <> assetBase <> \"lighting.hdr'\"\n    , \"  ar shadow-intensity='1' camera-controls touch-action='pan-y'\"\n    , \"  style='width:100%;height:400px'>\"\n    , \"<\/model-viewer>\"\n    ]\n\ndisplayWaterfall s = do\n  i <- randomRIO (0, 1000000 :: Int)\n  let modelFile = modelDir <> \"/\" <> show i <> \".glb\"\n  W.writeGLB 0.01 modelFile (W.rotate (unit _x) (pi / 2) s)\n  displayHtml (viewerHtml (\"/api/asset?path=\" <> modelFile))\n","cellType":"CodeCell"},{"cellDirty":false,"cellError":null,"cellId":49,"cellLang":"Haskell","cellOutputs":[],"cellSource":"\nIn CSG modelling, you start with simple \"primitive\" shapes, such as a cylinder.\n\n","cellType":"ProseCell"},{"cellDirty":false,"cellError":null,"cellId":50,"cellLang":"Haskell","cellOutputs":[{"oiMime":"text/html","oiOutput":"<script type=\"module\" src=\"https://ajax.googleapis.com/ajax/libs/model-viewer/4.3.1/model-viewer.min.js\"><\/script>\n<model-viewer src=\"https://raw.githubusercontent.com/joe-warren/sabela/0b87c7bc183323cc38db5e5a2f20a500473a425a/waterfall/models/271686.glb\" ar shadow-intensity=\"1\" environment-image=\"https://raw.githubusercontent.com/joe-warren/sabela/0b87c7bc183323cc38db5e5a2f20a500473a425a/waterfall/lighting.hdr\" camera-controls touch-action=\"pan-y\" style=\"width:100%;height:400px\"><\/model-viewer>\n"}],"cellSource":"displayWaterfall W.unitCylinder\n","cellType":"CodeCell"},{"cellDirty":false,"cellError":null,"cellId":51,"cellLang":"Haskell","cellOutputs":[],"cellSource":"\nPrimitives can be transformed, for instance by scaling them.\n\n","cellType":"ProseCell"},{"cellDirty":false,"cellError":null,"cellId":52,"cellLang":"Haskell","cellOutputs":[{"oiMime":"text/html","oiOutput":"<script type=\"module\" src=\"https://ajax.googleapis.com/ajax/libs/model-viewer/4.3.1/model-viewer.min.js\"><\/script>\n<model-viewer src=\"https://raw.githubusercontent.com/joe-warren/sabela/0b87c7bc183323cc38db5e5a2f20a500473a425a/waterfall/models/396714.glb\" ar shadow-intensity=\"1\" environment-image=\"https://raw.githubusercontent.com/joe-warren/sabela/0b87c7bc183323cc38db5e5a2f20a500473a425a/waterfall/lighting.hdr\" camera-controls touch-action=\"pan-y\" style=\"width:100%;height:400px\"><\/model-viewer>\n"}],"cellSource":"scaleFactor = V3 1 1 3.5\n\nscaledCylinder = W.scale scaleFactor W.centeredCylinder\ndisplayWaterfall scaledCylinder\n","cellType":"CodeCell"},{"cellDirty":false,"cellError":null,"cellId":53,"cellLang":"Haskell","cellOutputs":[],"cellSource":"\nOr by rotating them.\n\nIn Waterfall-CAD, rotations are specified in [radians](https://en.wikipedia.org/wiki/Radian), so a quarter turn is a rotation of π/2.\n\n","cellType":"ProseCell"},{"cellDirty":false,"cellError":null,"cellId":54,"cellLang":"Haskell","cellOutputs":[{"oiMime":"text/html","oiOutput":"<script type=\"module\" src=\"https://ajax.googleapis.com/ajax/libs/model-viewer/4.3.1/model-viewer.min.js\"><\/script>\n<model-viewer src=\"https://raw.githubusercontent.com/joe-warren/sabela/0b87c7bc183323cc38db5e5a2f20a500473a425a/waterfall/models/469117.glb\" ar shadow-intensity=\"1\" environment-image=\"https://raw.githubusercontent.com/joe-warren/sabela/0b87c7bc183323cc38db5e5a2f20a500473a425a/waterfall/lighting.hdr\" camera-controls touch-action=\"pan-y\" style=\"width:100%;height:400px\"><\/model-viewer>\n"}],"cellSource":"rotatedCylinder = W.rotate (unit _y) (pi/2) scaledCylinder\ndisplayWaterfall rotatedCylinder\n","cellType":"CodeCell"},{"cellDirty":false,"cellError":null,"cellId":55,"cellLang":"Haskell","cellOutputs":[],"cellSource":"\nCSG modelling is all about using \"Boolean operators\" to combine pairs of solids. \n\nOne of the most common Boolean operators is \"union\", which merges the volumes of the two shapes.\n\nIn the Wikipedia diagram, \"union\" was represented with the \"∪\" character. \n\nMerging our cylinder with the rotated cylinder gives us a cross shape. \n\n","cellType":"ProseCell"},{"cellDirty":false,"cellError":null,"cellId":56,"cellLang":"Haskell","cellOutputs":[{"oiMime":"text/html","oiOutput":"<script type=\"module\" src=\"https://ajax.googleapis.com/ajax/libs/model-viewer/4.3.1/model-viewer.min.js\"><\/script>\n<model-viewer src=\"https://raw.githubusercontent.com/joe-warren/sabela/0b87c7bc183323cc38db5e5a2f20a500473a425a/waterfall/models/492778.glb\" ar shadow-intensity=\"1\" environment-image=\"https://raw.githubusercontent.com/joe-warren/sabela/0b87c7bc183323cc38db5e5a2f20a500473a425a/waterfall/lighting.hdr\" camera-controls touch-action=\"pan-y\" style=\"width:100%;height:400px\"><\/model-viewer>\n"}],"cellSource":"cross = scaledCylinder `W.union` rotatedCylinder\ndisplayWaterfall cross\n","cellType":"CodeCell"},{"cellDirty":false,"cellError":null,"cellId":57,"cellLang":"Haskell","cellOutputs":[],"cellSource":"\nBecause \"union\" is such a useful operator, Waterfall-CAD uses it in the `Monoid` instance for Solids, which means we can union two solids together using the `<>` operator.\n\n","cellType":"ProseCell"},{"cellDirty":false,"cellError":null,"cellId":58,"cellLang":"Haskell","cellOutputs":[{"oiMime":"text/html","oiOutput":"<script type=\"module\" src=\"https://ajax.googleapis.com/ajax/libs/model-viewer/4.3.1/model-viewer.min.js\"><\/script>\n<model-viewer src=\"https://raw.githubusercontent.com/joe-warren/sabela/0b87c7bc183323cc38db5e5a2f20a500473a425a/waterfall/models/559254.glb\" ar shadow-intensity=\"1\" environment-image=\"https://raw.githubusercontent.com/joe-warren/sabela/0b87c7bc183323cc38db5e5a2f20a500473a425a/waterfall/lighting.hdr\" camera-controls touch-action=\"pan-y\" style=\"width:100%;height:400px\"><\/model-viewer>\n"}],"cellSource":"threeDCross = cross <> W.rotate (unit _x) (pi/2) scaledCylinder\ndisplayWaterfall threeDCross\n","cellType":"CodeCell"},{"cellDirty":false,"cellError":null,"cellId":59,"cellLang":"Haskell","cellOutputs":[],"cellSource":"\nWaterfall-CAD has other primitive solids, such as cubes.\n\n","cellType":"ProseCell"},{"cellDirty":false,"cellError":null,"cellId":60,"cellLang":"Haskell","cellOutputs":[{"oiMime":"text/html","oiOutput":"<script type=\"module\" src=\"https://ajax.googleapis.com/ajax/libs/model-viewer/4.3.1/model-viewer.min.js\"><\/script>\n<model-viewer src=\"https://raw.githubusercontent.com/joe-warren/sabela/0b87c7bc183323cc38db5e5a2f20a500473a425a/waterfall/models/563306.glb\" ar shadow-intensity=\"1\" environment-image=\"https://raw.githubusercontent.com/joe-warren/sabela/0b87c7bc183323cc38db5e5a2f20a500473a425a/waterfall/lighting.hdr\" camera-controls touch-action=\"pan-y\" style=\"width:100%;height:400px\"><\/model-viewer>\n"}],"cellSource":"cube = W.scale 3 W.centeredCube \ndisplayWaterfall cube\n","cellType":"CodeCell"},{"cellDirty":false,"cellError":null,"cellId":61,"cellLang":"Haskell","cellOutputs":[],"cellSource":"\nAnd spheres.\n\n","cellType":"ProseCell"},{"cellDirty":false,"cellError":null,"cellId":62,"cellLang":"Haskell","cellOutputs":[{"oiMime":"text/html","oiOutput":"<script type=\"module\" src=\"https://ajax.googleapis.com/ajax/libs/model-viewer/4.3.1/model-viewer.min.js\"><\/script>\n<model-viewer src=\"https://raw.githubusercontent.com/joe-warren/sabela/0b87c7bc183323cc38db5e5a2f20a500473a425a/waterfall/models/747853.glb\" ar shadow-intensity=\"1\" environment-image=\"https://raw.githubusercontent.com/joe-warren/sabela/0b87c7bc183323cc38db5e5a2f20a500473a425a/waterfall/lighting.hdr\" camera-controls touch-action=\"pan-y\" style=\"width:100%;height:400px\"><\/model-viewer>\n"}],"cellSource":"sphere = W.scale 2 W.unitSphere\ndisplayWaterfall sphere\n","cellType":"CodeCell"},{"cellDirty":false,"cellError":null,"cellId":63,"cellLang":"Haskell","cellOutputs":[],"cellSource":"\nAnother Boolean operator used in CSG modelling is \"intersection\", which takes the region common to two solids.  \n\n","cellType":"ProseCell"},{"cellDirty":false,"cellError":null,"cellId":64,"cellLang":"Haskell","cellOutputs":[{"oiMime":"text/html","oiOutput":"<script type=\"module\" src=\"https://ajax.googleapis.com/ajax/libs/model-viewer/4.3.1/model-viewer.min.js\"><\/script>\n<model-viewer src=\"https://raw.githubusercontent.com/joe-warren/sabela/0b87c7bc183323cc38db5e5a2f20a500473a425a/waterfall/models/795000.glb\" ar shadow-intensity=\"1\" environment-image=\"https://raw.githubusercontent.com/joe-warren/sabela/0b87c7bc183323cc38db5e5a2f20a500473a425a/waterfall/lighting.hdr\" camera-controls touch-action=\"pan-y\" style=\"width:100%;height:400px\"><\/model-viewer>\n"}],"cellSource":"roundedCube = cube `W.intersection` sphere\ndisplayWaterfall roundedCube\n","cellType":"CodeCell"},{"cellDirty":false,"cellError":null,"cellId":65,"cellLang":"Haskell","cellOutputs":[],"cellSource":"\nThe last CSG modelling operator we're going to use is \"difference\" (sometimes called subtraction).\n\nThis is used to remove one solid from another.\n\n","cellType":"ProseCell"},{"cellDirty":false,"cellError":null,"cellId":66,"cellLang":"Haskell","cellOutputs":[{"oiMime":"text/html","oiOutput":"<script type=\"module\" src=\"https://ajax.googleapis.com/ajax/libs/model-viewer/4.3.1/model-viewer.min.js\"><\/script>\n<model-viewer src=\"https://raw.githubusercontent.com/joe-warren/sabela/0b87c7bc183323cc38db5e5a2f20a500473a425a/waterfall/models/796533.glb\" ar shadow-intensity=\"1\" environment-image=\"https://raw.githubusercontent.com/joe-warren/sabela/0b87c7bc183323cc38db5e5a2f20a500473a425a/waterfall/lighting.hdr\" camera-controls touch-action=\"pan-y\" style=\"width:100%;height:400px\"><\/model-viewer>\n"}],"cellSource":"shape = roundedCube `W.difference` threeDCross\ndisplayWaterfall shape\n","cellType":"CodeCell"},{"cellDirty":false,"cellError":null,"cellId":67,"cellLang":"Haskell","cellOutputs":[],"cellSource":"\nAnd with that, we've built the solid from the diagram.\n","cellType":"ProseCell"}],"nbTitle":"examples/CSG.md"};

    <script>
const isStatic = !!window.__SABELA_STATIC__;

const renderMode =
  window.__SABELA_RENDER_MODE__ || (_query.get('mode') === 'notebook' ? 'notebook' : 'dashboard');
// ?print=1 — open straight into the browser print dialog (used by the editor's

const autoPrint = _query.get('print') === '1';
const HLJS_LANG = { Haskell: 'haskell', Python: 'python' };
let notebookData = null;

// ── Theme handling (the same picker as the editor; 'sabela-theme' key) ──
const THEMES = [
  { id: 'warm', name: 'Warm Paper', mode: 'light', bg: '#f7f3ec', accent: '#c2674a' },
  { id: 'nord', name: 'Nord', mode: 'dark', bg: '#2e3440', accent: '#88c0d0' },
  { id: 'nord-light', name: 'Nord Light', mode: 'light', bg: '#eceff4', accent: '#5e81ac' },
  { id: 'nord-aurora', name: 'Aurora Purple', mode: 'dark', bg: '#2e3440', accent: '#b48ead' },
  { id: 'nord-ember', name: 'Aurora Ember', mode: 'dark', bg: '#2e3440', accent: '#d08770' },
  { id: 'vscode', name: 'VS Code Dark', mode: 'dark', bg: '#1e1e1e', accent: '#3794ff' },
];
function currentTheme() {
  const t = document.documentElement.dataset.theme;
  return THEMES.some((x) => x.id === t) ? t : 'warm';
}
function cssVar(name, fallback) {
  return (getComputedStyle(document.documentElement).getPropertyValue(name) || fallback).trim();
}
function applyTheme(theme, { persist = true } = {}) {
  document.documentElement.dataset.theme = theme;
  if (persist) {
    localStorage.setItem('sabela-theme', theme);
    window.__sabelaThemePinned = true;
  }
  // Re-render iframes with the current theme colors.
  document.querySelectorAll('iframe[data-last-content]').forEach((f) => {
    if (!f.dataset.lastContent) return;
    if (f.dataset.staticFrame) {
      f.srcdoc = staticSrcdoc(f.dataset.lastContent, f.dataset.iframeKind || 'content', f.id);
      return;
    }
    try {
      const doc = f.contentDocument || f.contentWindow?.document;
      if (!doc) return;
      doc.open();
      const style = f.dataset.iframeKind === 'widget' ? widgetIframeStyle() : iframeContentStyle();

      doc.close();

  });
  markActiveTheme();
}
function markActiveTheme() {
  const cur = currentTheme();

    .querySelectorAll('.theme-menu-item')

function buildThemeMenu() {
  let menu = document.getElementById('theme-menu');
  if (menu) return menu;
  menu = document.createElement('div');
  menu.id = 'theme-menu';

  THEMES.forEach((t) => {
    const item = document.createElement('button');
    item.className = 'theme-menu-item';
    item.dataset.theme = t.id;
    item.innerHTML =
      `<span class="sw" style="background:${t.bg}"><i style="background:${t.accent}"></i></span>` +
      `<span class="nm">${t.name}</span>`;
    item.onclick = () => {
      applyTheme(t.id);
      menu.classList.remove('open');
    };
    menu.appendChild(item);
  });
  document.body.appendChild(menu);
  return menu;
}
function openThemePicker() {
  const menu = buildThemeMenu();
  const btn = document.getElementById('theme-toggle');
  if (btn) {
    const r = btn.getBoundingClientRect();
    menu.style.top = r.bottom + 6 + 'px';
    menu.style.right = window.innerWidth - r.right + 'px';
  }
  const open = menu.classList.toggle('open');
  markActiveTheme();
  if (open) {
    setTimeout(() => {
      document.addEventListener(
        'click',
        (e) => {
          if (!menu.contains(e.target) && e.target !== btn && !btn?.contains(e.target))
            menu.classList.remove('open');
        },
        { once: true }

    }, 0);
  }
}
// The header button's onclick is toggleTheme(); keep the name, open the picker.
function toggleTheme() {

}
function iframeContentStyle() {
  const bg = cssVar('--bg-card', '#ffffff');
  const fg = cssVar('--fg', '#0a0a0a');
  const fgHead = cssVar('--fg-heading', '#000000');

  const altRow = `rgba(${cssVar('--accent-rgb', '0,102,255')},0.05)`;
  return `<style>body{background:${bg};color:${fg};font-family:'Geist',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;font-size:15px;margin:0;padding:12px 16px;line-height:1.6;-webkit-font-smoothing:antialiased}img{max-width:100%}a{color:${accent}}table{border-collapse:separate;border-spacing:0;width:100%;border:1px solid ${border};border-radius:8px;overflow:hidden;margin:14px 0;font-size:14px}th,td{padding:10px 14px;text-align:left;border-bottom:1px solid ${border}}tr:last-child td{border-bottom:none}th{background:${muted};color:${fgHead};font-weight:600}tr:nth-child(even) td{background:${altRow}}input,select,button{font-family:inherit;font-size:14px;accent-color:${accent}}</style>`;
}
function widgetIframeStyle() {
  const fg = cssVar('--fg', '#0a0a0a');
  const fgDim = cssVar('--fg-dim', '#71717a');
  const accent = cssVar('--accent', '#0066ff');
  return `<style>body{background:transparent;color:${fg};font-family:'JetBrains Mono',ui-monospace,monospace;font-size:14px;margin:0;padding:6px 12px;line-height:1.2;font-variant-ligatures:none;font-feature-settings:"calt" 0,"liga" 0}input,select{font-family:inherit;font-size:14px;accent-color:${accent};vertical-align:middle}button{font-family:inherit;font-size:14px;cursor:pointer;accent-color:${accent};vertical-align:middle}label{font-weight:600;font-size:13px;color:${fgDim};display:inline-block;margin-right:8px;vertical-align:middle}</style>`;
}
// ── Static-export iframe: opaque-origin sandbox + in-document CSP ──
// In a shared/offline export we still run a script-drawn widget so its plot
// renders, but sandbox='allow-scripts' (NO allow-same-origin) gives the frame an
// opaque origin that cannot read this page (the embedded notebook JSON), cookies,
// or storage; the meta-CSP allows charting libs from trusted CDNs (cdnjs,
// jsdelivr) but keeps connect-src closed, so a plot can draw yet can't
// exfiltrate the page. 'unsafe-eval' is required because Vega compiles its
// dataflow expressions at runtime via the Function() constructor; it adds
// little risk here since 'unsafe-inline' already runs arbitrary script and the
// opaque origin + closed connect-src block any reads or exfiltration. Because

const STATIC_CSP =
  "<meta http-equiv=\"Content-Security-Policy\" content=\"default-src 'none'; script-src 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; style-src 'unsafe-inline'; img-src data:; base-uri 'none'; form-action 'none'; frame-src 'none'\">";
let __staticFrameSeq = 0;
function staticSrcdoc(content, kind, id) {
  const style = kind === 'widget' ? widgetIframeStyle() : iframeContentStyle();
  const reporter =
    '<scr' +
    "ipt>(function(){function r(){try{parent.postMessage({__sabelaH:document.documentElement.scrollHeight,__sabelaId:'" +
    id +
    "'},'*')}catch(e){}}requestAnimationFrame(function(){r();setTimeout(r,60)})})();</scr" +
    'ipt>';

}
function mountStaticFrame(container, content, kind) {

  iframe.id = id;

  iframe.dataset.iframeKind = kind;
  iframe.dataset.lastContent = content;
  iframe.dataset.staticFrame = '1';
  iframe.srcdoc = staticSrcdoc(content, kind, id);
  container.appendChild(iframe);
}
window.addEventListener('message', (e) => {
  const d = e.data;
  if (d && typeof d.__sabelaH === 'number' && d.__sabelaId) {
    const el = document.getElementById(d.__sabelaId);
    if (el && el.dataset.staticFrame) el.style.height = Math.max(32, d.__sabelaH) + 'px';
  }
});
// Initial sync (renders iframes with the active theme).
applyTheme(currentTheme(), { persist: false });
// ── Initialization ───────────────────────────────────────────────
async function init() {
  if (isStatic) {
    notebookData = window.__SABELA_STATIC__;
    document.getElementById('edit-link').style.display = 'none';
    document.getElementById('export-btn').style.display = 'none';
  } else {
    const resp = await fetch('/api/notebook');
    notebookData = await resp.json();
  }
  renderDashboard(notebookData);
  if (renderMode === 'notebook') setupDownloadMd();
  if (!isStatic) connectSSE();
  // Opened with ?print=1 — let layout settle (iframes report heights, fonts
  // load), then drop straight into the print dialog.
  if (autoPrint) requestAnimationFrame(() => setTimeout(printToPdf, 300));
}

// In notebook (tutorial) mode, offer the notebook source for download so a
// reader can upload it into their own Sabela workspace and run it.
function setupDownloadMd() {
  const md = window.__SABELA_MARKDOWN__;
  const actions = document.getElementById('header-actions');
  if (!md || !actions || document.getElementById('dl-md-btn')) return;
  const btn = document.createElement('button');
  btn.id = 'dl-md-btn';
  btn.textContent = 'Download .md';
  btn.title = 'Download the notebook source — upload it into your own Sabela workspace to run it';
  btn.addEventListener('click', () => {
    const title = (notebookData && notebookData.nbTitle) || 'notebook.md';
    const name = /\.md$/.test(title) ? title.split('/').pop() : 'notebook.md';
    const blob = new Blob([md], { type: 'text/markdown' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = name;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => {
      URL.revokeObjectURL(a.href);
      a.remove();
    }, 0);
  });
  actions.insertBefore(btn, actions.firstChild);
}
// ── Print to PDF ─────────────────────────────────────────────────
// Browsers print an <iframe> as one atomic box: a tall frame is clipped at the
// page edge, not paginated. Content outputs (e.g. dataframe tables) live in
// iframes, so before printing we swap each one for inline, script-stripped DOM
// that flows across pages. SVG/markdown/image/JSON/plain outputs are already
// inline and need no help; short widget iframes are left as-is.

// Strip <script> elements and on*= handlers, then return the safe HTML. Inlining
// runs in this page's origin (unlike the sandboxed iframe), so for untrusted
// static shares this prevents the output HTML from executing.
function sanitizeForPrint(html) {
  const tpl = document.createElement('template');
  tpl.innerHTML = html;
  tpl.content.querySelectorAll('script').forEach((s) => s.remove());
  tpl.content.querySelectorAll('*').forEach((el) => {
    for (const attr of [...el.attributes]) {
      if (/^on/i.test(attr.name)) el.removeAttribute(attr.name);
    }
  });
  return tpl.innerHTML;
}

// Replace each content iframe with an inline .print-inline div; return undo fns.
function inlineContentFramesForPrint() {
  const frames = [...document.querySelectorAll('iframe[data-last-content]')].filter(
    (f) => f.dataset.iframeKind !== 'widget'
  );
  const restore = [];
  for (const f of frames) {
    const div = document.createElement('div');
    div.className = 'print-inline';
    div.innerHTML = sanitizeForPrint(f.dataset.lastContent || '');
    f.style.display = 'none';
    f.parentNode.insertBefore(div, f);
    restore.push(() => {
      div.remove();
      f.style.display = '';
    });
  }
  return restore;
}

function printToPdf() {
  const restore = inlineContentFramesForPrint();
  const cleanup = () => {
    restore.forEach((r) => r());
    window.removeEventListener('afterprint', cleanup);
  };
  window.addEventListener('afterprint', cleanup);
  requestAnimationFrame(() => window.print());
}
// ── Render dashboard ─────────────────────────────────────────────
function renderDashboard(nb) {
  document.getElementById('dashboard-title').textContent = formatTitle(nb.nbTitle);
  document.title = formatTitle(nb.nbTitle) + ' — Sabela Dashboard';

  const main = document.getElementById('main-content');
  main.innerHTML = '';

  const cells = nb.nbCells || [];
  for (const cell of cells) {
    renderCellOutputs(main, cell, null);
  }
}

// Render KaTeX inside a markdown source before handing to marked, so
// $...$ / $$...$$ blocks survive marked's underscore/star handling.
// Safe no-op if katex isn't available.
function renderMarkdownWithMath(src) {
  let s = src || '';
  if (typeof katex !== 'undefined') {
    s = s.replace(/\$\$([\s\S]+?)\$\$/g, (_, tex) => {
      try {
        return katex.renderToString(tex.trim(), { displayMode: true, throwOnError: false });
      } catch (_e) {
        return _;
      }
    });
    s = s.replace(/(^|[^\\$])\$([^\$\n]+?)\$(?!\d)/g, (_, pre, tex) => {
      try {
        return pre + katex.renderToString(tex, { displayMode: false, throwOnError: false });
      } catch (_e) {
        return _;
      }
    });
  }
  return marked.parse(s);
}

// ── Render a single cell's outputs into the container ────────────
function renderCellOutputs(container, cell, insertBefore) {
  if (cell.cellType === 'ProseCell') {
    const section = document.createElement('div');
    section.className = 'dash-section';
    section.dataset.cellId = cell.cellId;
    section.innerHTML = renderMarkdownWithMath(cell.cellSource || '');
    section.querySelectorAll('table').forEach((t) => {
      const w = document.createElement('div');
      w.style.overflowX = 'auto';
      t.parentNode.insertBefore(w, t);
      w.appendChild(t);
    });
    container.insertBefore(section, insertBefore);
    return;
  }

  // CodeCell — in notebook (tutorial) mode, show the source above its outputs.
  if (renderMode === 'notebook' && (cell.cellSource || '').trim()) {
    const codeWrap = document.createElement('div');
    codeWrap.className = 'dash-code';
    codeWrap.dataset.cellId = cell.cellId;
    const pre = document.createElement('pre');
    const codeEl = document.createElement('code');
    codeEl.className = 'hljs';
    const src = cell.cellSource || '';
    const hl = HLJS_LANG[cell.cellLang || 'Haskell'];
    if (hl && window.hljs && hljs.getLanguage(hl)) {
      codeEl.innerHTML = hljs.highlight(src, { language: hl }).value;
    } else {
      codeEl.textContent = src;
    }
    pre.appendChild(codeEl);
    codeWrap.appendChild(pre);
    container.insertBefore(codeWrap, insertBefore);
  }

  // CodeCell — render all outputs inline in order
  const outputs = cell.cellOutputs || [];
  const merged = mergeHtmlOutputs(outputs);
  for (const o of merged) {
    if (!o.oiOutput || !o.oiOutput.trim()) continue;
    const isWidget = classifyOutput(o) === 'widget';
    const card = document.createElement('div');
    card.className = isWidget ? 'dash-widget' : 'dash-output';
    card.dataset.cellId = cell.cellId;

    if (isWidget) {
      renderWidgetOutput(card, o, cell.cellId);
    } else {
      renderOutput(card, o.oiOutput, o.oiMime);
    }
    container.insertBefore(card, insertBefore);
  }

  // Show errors
  if (cell.cellError && cell.cellError.trim()) {
    const errEl = document.createElement('div');
    errEl.className = 'dash-error';
    errEl.dataset.cellId = cell.cellId;
    errEl.textContent = cell.cellError;
    container.insertBefore(errEl, insertBefore);
  }
}

// ── Output classification ────────────────────────────────────────
function classifyOutput(item) {
  if (
    item.oiMime === 'text/html' &&
    item.oiOutput &&
    item.oiOutput.includes('parent.postMessage')
  ) {
    return 'widget';
  }
  return 'content';
}

// ── Merge consecutive HTML outputs (non-widget only) ─────────────
function mergeHtmlOutputs(outputs) {
  const merged = [];
  for (const o of outputs) {
    const isWidget = classifyOutput(o) === 'widget';
    const last = merged[merged.length - 1];
    if (
      !isWidget &&
      o.oiMime === 'text/html' &&
      last &&
      last.oiMime === 'text/html' &&
      classifyOutput(last) !== 'widget'
    ) {
      last.oiOutput += '\n' + o.oiOutput;
    } else {
      merged.push({ oiMime: o.oiMime, oiOutput: o.oiOutput });
    }
  }
  return merged;
}
// ── Render a content output ──────────────────────────────────────
function renderOutput(container, content, mime) {
  if (mime === 'text/html') {
    if (isStatic) {
      mountStaticFrame(container, content, 'content');
      return;
    }
    const iframe = document.createElement('iframe');
    iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin');
    iframe.style.visibility = 'hidden';
    container.appendChild(iframe);
    requestAnimationFrame(() => {
      const doc = iframe.contentDocument || iframe.contentWindow?.document;
      if (!doc) return;
      iframe.dataset.lastContent = content;
      doc.open();
      iframe.onload = () => {
        iframe.style.height = Math.max(60, doc.body.scrollHeight + 20) + 'px';
        iframe.style.visibility = '';
      };
      doc.write(iframeContentStyle() + content);
      doc.close();
    });
  } else if (mime === 'text/markdown') {
    const div = document.createElement('div');
    div.className = 'mime-markdown';
    div.innerHTML = renderMarkdownWithMath(content);
    div.querySelectorAll('table').forEach((t) => {
      const w = document.createElement('div');
      w.style.overflowX = 'auto';
      t.parentNode.insertBefore(w, t);
      w.appendChild(t);
    });
    container.appendChild(div);
  } else if (mime === 'image/svg+xml') {
    const div = document.createElement('div');
    div.className = 'mime-svg';
    div.innerHTML = content;
    container.appendChild(div);
  } else if (mime.startsWith('image/') && mime.includes('base64')) {
    const div = document.createElement('div');
    div.className = 'mime-image';
    const mimeClean = mime.replace(';base64', '');
    div.innerHTML = '<img src="data:' + mimeClean + ';base64,' + content.trim() + '" />';
    container.appendChild(div);
  } else if (mime === 'application/json') {
    const div = document.createElement('div');
    div.className = 'mime-json';
    try {
      div.textContent = JSON.stringify(JSON.parse(content), null, 2);
    } catch {
      div.textContent = content;
    }
    container.appendChild(div);
  } else if (mime === 'text/latex') {
    const div = document.createElement('div');
    div.className = 'mime-latex';
    try {
      katex.render(content, div, { displayMode: true, throwOnError: false });
    } catch {
      div.textContent = content;
    }
    container.appendChild(div);
  } else {
    const div = document.createElement('div');
    div.className = 'mime-plain';
    div.textContent = content;
    container.appendChild(div);
  }
}

// ── Render widget inline ─────────────────────────────────────────
function renderWidgetOutput(container, output, cellId) {
  if (isStatic) {
    // Script-drawn widgets (e.g. the scatter <canvas>) need their script to run to
    // render at all — do it in the opaque-origin, network-dead sandbox (see
    // mountStaticFrame), inert via pointer-events:none. Form controls have no such
    // need and stay as greyed-out, script-stripped placeholders.
    if (/<canvas|<script/i.test(output.oiOutput)) {
      mountStaticFrame(container, output.oiOutput, 'widget');
      return;
    }
    const wrapper = document.createElement('div');
    wrapper.className = 'static-widget';
    let cleaned = output.oiOutput
      .replace(/\s*on\w+="[^"]*"/g, '')
      .replace(/<(input|select|button)/gi, '<$1 disabled');
    wrapper.innerHTML = cleaned;
    container.appendChild(wrapper);
    return;
  }

  const iframe = document.createElement('iframe');
  iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin');
  iframe.style.visibility = 'hidden';
  container.appendChild(iframe);

  requestAnimationFrame(() => {
    const doc = iframe.contentDocument || iframe.contentWindow?.document;
    if (!doc) return;
    iframe.dataset.lastContent = output.oiOutput;
    iframe.dataset.iframeKind = 'widget';
    doc.open();
    iframe.onload = () => {
      iframe.style.height = Math.max(32, doc.body.scrollHeight) + 'px';
      iframe.style.visibility = '';
    };
    doc.write(widgetIframeStyle() + output.oiOutput);
    doc.close();
  });
}
// ── SSE (live mode only) ─────────────────────────────────────────
function connectSSE() {
  const evtSource = new EventSource('/api/events');
  evtSource.onmessage = (e) => {
    const ev = JSON.parse(e.data);
    switch (ev.type) {
      case 'cellUpdating':
        showStatus('Running...', true);
        break;
      case 'cellResult':
        updateDashboardCell(ev.cellId, ev.outputs || [], ev.error);
        break;
      case 'executionDone':
        hideStatus();
        break;
      case 'sessionStatus':
        if (ev.message === 'ready') hideStatus();
        else showStatus(ev.message, true);
        break;
    }
  };
  evtSource.onerror = () => {
    showStatus('Disconnected', false);
  };
}

// ── Update a cell in the dashboard ───────────────────────────────
function updateDashboardCell(cellId, outputs, error) {
  if (!notebookData) return;
  const cell = (notebookData.nbCells || []).find((c) => c.cellId === cellId);
  if (!cell) return;

  cell.cellOutputs = outputs;
  cell.cellError = error || null;

  // Remove only this cell's existing DOM nodes
  const main = document.getElementById('main-content');
  main.querySelectorAll(`[data-cell-id="${cellId}"]`).forEach((el) => el.remove());

  // Find the next cell's first DOM node to insert before
  const cells = notebookData.nbCells;
  const cellIndex = cells.indexOf(cell);
  let insertBefore = null;
  for (let j = cellIndex + 1; j < cells.length; j++) {
    const nextNode = main.querySelector(`[data-cell-id="${cells[j].cellId}"]`);
    if (nextNode) {
      insertBefore = nextNode;
      break;
    }
  }

  // Re-render just this cell
  renderCellOutputs(main, cell, insertBefore);
}

// ── Widget postMessage bridge (live mode) ────────────────────────
const _widgetTimers = new Map();
window.addEventListener('message', (e) => {
  if (isStatic) return;
  const d = e.data;
  if (d && d.type === 'widget') {
    const key = d.cellId + ':' + d.name;
    clearTimeout(_widgetTimers.get(key));
    _widgetTimers.set(
      key,
      setTimeout(() => {
        _widgetTimers.delete(key);
        fetch('/api/widget', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ wuCellId: d.cellId, wuName: d.name, wuValue: d.value }),
        });
      }, 300)
    );
  }
});

// ── Status indicator ─────────────────────────────────────────────
function showStatus(msg, running) {
  const el = document.getElementById('status-indicator');
  el.textContent = msg;
  el.className = 'dash-status visible' + (running ? ' running' : '');
}
function hideStatus() {
  document.getElementById('status-indicator').className = 'dash-status';
}

// ── Export button (live mode) ────────────────────────────────────
function exportDashboard() {
  window.open('/api/export/dashboard', '_blank');
}

// ── Title formatting ─────────────────────────────────────────────
function formatTitle(path) {
  if (!path) return 'Dashboard';
  const name = path
    .split('/')
    .pop()
    .replace(/\.[^/.]+$/, '');
  return name.charAt(0).toUpperCase() + name.slice(1);
}

// ── Go ───────────────────────────────────────────────────────────
init();
