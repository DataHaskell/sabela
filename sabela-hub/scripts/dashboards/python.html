  position: sticky;
  top: 0;
  z-index: 100;

  align-items: center;

  padding: 12px 24px;

}

  font-weight: 600;
  font-size: 15px;
  color: var(--fg-heading);
  white-space: nowrap;
}

}
.dashboard-header h1 {

  font-size: 15px;
  font-weight: 600;

}

}

  border: 1px solid transparent;

.header-actions .icon-btn:hover {

}
.icon-svg {

  stroke-linecap: round;

  border-radius: 6px;

}
.theme-menu-item:hover {

}
.theme-menu-item.active {

  font-weight: 500;
}
.theme-menu-item .sw {
  width: 26px;
  height: 18px;
  border-radius: 4px;
  border: 1px solid var(--border);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.theme-menu-item .sw i {

  height: 8px;
  border-radius: 50%;
}
.theme-menu-item.active .nm::after {
  content: ' ✓';
  color: var(--accent);
}
/* ── Main content ──────────────────────────── */
.dashboard-main {
  padding: 32px 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.dashboard-content {
  width: 100%;
  max-width: var(--main-max-w);
}

/* ── Sections (prose cells) ────────────────── */
.dash-section {
  margin-bottom: 24px;
}
.dash-section h1 {
  font-size: 28px;
  font-weight: 700;
  color: var(--fg-heading);
  margin-bottom: 8px;
}
.dash-section h2 {
  font-size: 22px;
  font-weight: 600;
  color: var(--fg-heading);
  margin-bottom: 6px;
}
.dash-section h3 {
  font-size: 18px;
  font-weight: 600;
  color: var(--fg-heading);
  margin-bottom: 4px;
}
.dash-section p {
  margin-bottom: 12px;
}
/* padding-left (not margin-left) so nested lists compound and markers
     have room after the global "* { padding:0 }" reset. */
.dash-section ul,
.dash-section ol,
.dash-output .mime-markdown ul,
.dash-output .mime-markdown ol {
  margin: 0 0 12px;
  padding-left: 1.5em;
}
.dash-section li,
.dash-output .mime-markdown li {
  margin: 3px 0;
}
.dash-section li > ul,
.dash-section li > ol,
.dash-output .mime-markdown li > ul,
.dash-output .mime-markdown li > ol {
  margin: 3px 0 5px;
}
.dash-section ul,
.dash-output .mime-markdown ul {
  list-style: disc;
}
.dash-section ul ul,
.dash-output .mime-markdown ul ul {
  list-style: circle;
}
.dash-section ul ul ul,
.dash-output .mime-markdown ul ul ul {
  list-style: square;
}
.dash-section ol,
.dash-output .mime-markdown ol {
  list-style: decimal;
}
.dash-section a {
  color: var(--accent);
}
.dash-section code {
  font-family: var(--font-mono);
  font-size: 14px;
  background: var(--bg-muted);
  padding: 2px 6px;
  border-radius: 4px;
}
.dash-section pre {
  font-family: var(--font-mono);
  font-size: 14px;
  background: var(--bg-muted);
  padding: 12px 16px;
  border-radius: var(--radius);
  overflow-x: auto;
  margin-bottom: 12px;
}
/* ── Tables (prose + markdown outputs) ─────── */
.dash-section table,
.dash-output .mime-markdown table {
  border-collapse: separate;
  border-spacing: 0;
  width: 100%;
  margin: 14px 0;
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  font-size: 14px;
  box-shadow: var(--shadow);
  background: var(--bg-card);
}
.dash-section th,
.dash-section td,
.dash-output .mime-markdown th,
.dash-output .mime-markdown td {
  padding: 10px 14px;
  text-align: left;
  border-bottom: 1px solid var(--border-light);
}
.dash-section tr:last-child td,
.dash-output .mime-markdown tr:last-child td {
  border-bottom: none;
}
.dash-section th,
.dash-output .mime-markdown th {
  background: var(--bg-muted);
  color: var(--fg-heading);
  font-weight: 600;
  font-size: 13px;
  letter-spacing: 0.2px;
  border-bottom: 1px solid var(--border);
}
.dash-section tr:nth-child(even) td,
.dash-output .mime-markdown tr:nth-child(even) td {
  background: rgba(var(--accent-rgb), 0.04);
}
.dash-section tbody tr:hover td,
.dash-output .mime-markdown tbody tr:hover td {
  background: rgba(var(--accent-rgb), 0.08);
}
/* Right-align numeric-looking columns automatically isn't possible without JS;
     leave default alignment but tighten cell typography. */
.dash-section td,
.dash-output .mime-markdown td {
  font-variant-numeric: tabular-nums;
}
.dash-section blockquote {
  border-left: 3px solid var(--accent);
  padding: 8px 16px;
  color: var(--fg-dim);
  margin-bottom: 12px;
}
/* ── Output cards ──────────────────────────── */
.dash-output {
  margin-bottom: 24px;
  border: 1px solid var(--border-light);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
}
.dash-output iframe {
  width: 100%;
  border: none;
  display: block;
  min-height: 60px;
}
.dash-output .mime-svg {
  padding: 8px;
}
.dash-output .mime-svg svg {
  max-width: 100%;
  height: auto;
}
.dash-output .mime-image img {
  max-width: 100%;
  display: block;
}
.dash-output .mime-json {
  font-family: var(--font-mono);
  font-size: 13px;
  background: var(--bg-muted);
  padding: 12px 16px;
  white-space: pre-wrap;
  word-break: break-word;
}
.dash-output .mime-markdown {
  padding: 16px;
}
.dash-output .mime-latex {
  padding: 16px;
  text-align: center;
}
.dash-output .mime-plain {
  font-family: var(--font-mono);
  font-size: 14px;
  padding: 12px 16px;
  white-space: pre-wrap;
}

/* ── Inline widgets ────────────────────────── */
.dash-widget {
  margin-bottom: 8px;
  border-radius: 6px;
  overflow: hidden;
  background: var(--bg-muted);
}
.dash-widget iframe {
  width: 100%;
  border: none;
  display: block;
  height: 36px;
}
.dash-widget .static-widget {
  font-size: 14px;
  padding: 6px 12px;
}
.dash-widget .static-widget input[disabled],
.dash-widget .static-widget select[disabled] {
  opacity: 0.7;
  cursor: default;
}
/* ── Error display ─────────────────────────── */
.dash-error {
  margin-bottom: 24px;
  padding: 12px 16px;
  border: 1px solid var(--err-border);
  border-radius: var(--radius);
  background: var(--err-bg);
  color: var(--err-fg);
  font-family: var(--font-mono);
  font-size: 13px;
  white-space: pre-wrap;
}

/* ── Status indicator ──────────────────────── */
.dash-status {
  position: fixed;
  bottom: 16px;
  right: 16px;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  background: var(--bg-muted);
  border: 1px solid var(--border);
  color: var(--fg-dim);
  display: none;
}
.dash-status.visible {
  display: block;
}
.dash-status.running {
  color: var(--accent);
  border-color: var(--accent);
}

/* ── Responsive ────────────────────────────── */
@media (max-width: 768px) {
  .dashboard-main {
    padding: 16px;
  }
  .dashboard-content {
    max-width: 100%;
  }
}
/* ── Print / Save as PDF ───────────────────────
     Force a light, ink-friendly page regardless of the on-screen theme, hide
     the app chrome, and make tall outputs paginate cleanly. Content iframes are
     swapped for inline .print-inline DOM by printToPdf() before this applies. */
@media print {
  :root,
  :root[data-theme='dark'] {
    --bg: #ffffff;
    --bg-muted: #f6f6f6;
    --bg-card: #ffffff;
    --fg: #111111;
    --fg-dim: #555555;
    --fg-heading: #000000;
    --accent: #0050d0;
    --accent-rgb: 0, 80, 208;
    --border: #cccccc;
    --border-light: #e0e0e0;
    --shadow: none;
  }
  html,
  body {
    height: auto;
    overflow: visible;
  }
  body {
    font-size: 11pt;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  @page {
    margin: 18mm 14mm;
  }

  /* Hide app chrome — only prose + outputs (and code, in notebook mode) print. */
  .dashboard-header,
  .dash-status {
    display: none !important;
  }
  .dashboard-main {
    padding: 0;
    display: block;
  }
  .dashboard-content {
    max-width: 100%;
  }

  * {
    box-shadow: none !important;
  }

  /* Keep small blocks whole; let tall tables split with a repeating header. */
  .dash-section,
  .dash-code,
  .dash-widget,
  .dash-error,
  .dash-output:not(:has(table)) {
    break-inside: avoid;
  }
  .dash-output,
  .print-inline {
    break-inside: auto;
  }
  table {
    break-inside: auto;
  }
  thead {
    display: table-header-group;
  }
  tr,
  img,
  svg {
    break-inside: avoid;
  }
  h1,
  h2,
  h3 {
    break-after: avoid;
  }

  /* Wrap long lines so nothing clips off the right edge of the page. */
  .dash-code code,

window.__SABELA_STATIC__ = {"nbCells":[{"cellDirty":false,"cellError":null,"cellId":0,"cellLang":"Haskell","cellOutputs":[],"cellSource":"# Haskell and Python in one notebook\n\nMost data work ends up split across two languages. The shape of the data, the\nrules it obeys, the transformations that must stay correct, all of that is a good\nfit for Haskell and its types. The plotting, the quick numerical work, and the\nmachine-learning libraries live in Python. Moving between the two usually means\nfiles on disk, a serialisation format, and a script to glue them together.\n\nSabela runs both in the same document. A Haskell cell and a Python cell sit in\none notebook, each in its own process, and values cross between them over a small\nbridge. This notebook works through that, ending with a Haskell data type whose\nvalues are drawn by matplotlib.\n\nPython 3 needs to be on the path. Everything else is declared in the cells.\n\n## A Python cell\n\nA code cell runs Haskell by default. To make it a Python cell, pick **py** from\nthe language dropdown in the cell's gutter. The border turns yellow and the cell\nruns against a Python interpreter instead.\n\n","cellType":"ProseCell"},{"cellDirty":false,"cellError":null,"cellId":1,"cellLang":"Python","cellOutputs":[{"oiMime":"text/plain","oiOutput":"Hello from Python\n"}],"cellSource":"print(\"Hello from Python\")\n","cellType":"CodeCell"},{"cellDirty":false,"cellError":null,"cellId":2,"cellLang":"Haskell","cellOutputs":[],"cellSource":"\nThe interpreter stays alive between cells, so anything bound in one cell is in\nscope in the cells below it, the same way a Haskell binding is.\n\n","cellType":"ProseCell"},{"cellDirty":false,"cellError":null,"cellId":3,"cellLang":"Python","cellOutputs":[],"cellSource":"greeting = \"from the same session\"\nnumbers = [1, 2, 3, 4]\n","cellType":"CodeCell"},{"cellDirty":false,"cellError":null,"cellId":4,"cellLang":"Haskell","cellOutputs":[],"cellSource":"\n","cellType":"ProseCell"},{"cellDirty":false,"cellError":null,"cellId":5,"cellLang":"Python","cellOutputs":[{"oiMime":"text/plain","oiOutput":"from the same session\nsum: 10\n"}],"cellSource":"print(greeting)\nprint(\"sum:\", sum(numbers))\n","cellType":"CodeCell"},{"cellDirty":false,"cellError":null,"cellId":6,"cellLang":"Haskell","cellOutputs":[],"cellSource":"\n## Drawing with matplotlib\n\nA Python cell can return rich output, not just text. The helpers `displayHtml`,\n`displayMarkdown`, `displaySvg`, and `displayImage` each emit a value the notebook\nrenders inline. For matplotlib the one to reach for is `displayImage`, which takes\na MIME type and base64 data, so a figure is saved to a buffer and handed over as a\nPNG.\n\nThe first cell sets up matplotlib and a small helper. The `# pip:` lines declare\nthe packages; Sabela installs them into a private virtual environment the first\ntime the cell runs, so there is nothing to install by hand.\n\n","cellType":"ProseCell"},{"cellDirty":false,"cellError":null,"cellId":7,"cellLang":"Python","cellOutputs":[],"cellSource":"# pip: matplotlib\n# pip: numpy\nimport matplotlib\n\nmatplotlib.use(\"Agg\")\nimport matplotlib.pyplot as plt\nimport numpy as np\nimport base64, io\n\n\ndef show_plot(fig=None):\n    fig = fig or plt.gcf()\n    buf = io.BytesIO()\n    fig.savefig(buf, format=\"png\", bbox_inches=\"tight\", dpi=110)\n    buf.seek(0)\n    displayImage(\"image/png\", base64.b64encode(buf.read()).decode())\n    plt.close(fig)\n","cellType":"CodeCell"},{"cellDirty":false,"cellError":null,"cellId":8,"cellLang":"Haskell","cellOutputs":[],"cellSource":"\nWith that in place, a plot is ordinary matplotlib followed by `show_plot`.\n\n","cellType":"ProseCell"},{"cellDirty":false,"cellError":null,"cellId":9,"cellLang":"Python","cellOutputs":[{"oiMime":"image/png;base64","oiOutput":"iVBORw0KGgoAAAANSUhEUgAAApsAAAFFCAYAAACjTiamAAAAOnRFWHRTb2Z0d2FyZQBNYXRwbG90bGliIHZlcnNpb24zLjExLjAsIGh0dHBzOi8vbWF0cGxvdGxpYi5vcmcvlcelbwAAAAlwSFlzAAAQ6wAAEOsBUJTofAAAlqpJREFUeJztnQV0XN `exportBridge`, giving it a name. Below, the same value\nis waiting in a Python variable with a `_bridge_` prefix.\n\n","cellType":"ProseCell"},{"cellDirty":false,"cellError":null,"cellId":11,"cellLang":"Haskell","cellOutputs":[],"cellSource":"let names = [\"Tariro\", \"Farai\", \"Chipo\"] :: [String]\nexportBridge \"names\" (show names)\n","cellType":"CodeCell"},{"cellDirty":false,"cellError":null,"cellId":12,"cellLang":"Haskell","cellOutputs":[],"cellSource":"\nBridge values always arrive as strings, so the receiving side parses them. A\nHaskell list printed with `show` reads cleanly with Python's `ast.literal_eval`.\n\n","cellType":"ProseCell"},{"cellDirty":false,"cellError":null,"cellId":13,"cellLang":"Python","cellOutputs":[{"oiMime":"text/plain","oiOutput":"received 3 names\nfirst: Tariro\n"}],"cellSource":"import ast\n\nnames = ast.literal_eval(_bridge_names)\nprint(\"received\", len(names), \"names\")\nprint(\"first:\", names[0])\n","cellType":"CodeCell"},{"cellDirty":false,"cellError":null,"cellId":14,"cellLang":"Haskell","cellOutputs":[],"cellSource":"\nThat is enough for lists and numbers. For anything with structure, it is worth\nsending JSON.\n\n## A Haskell type, plotted in Python\n\nHere is the point of the whole exercise. Model the data in Haskell with a proper\ntype, then let Python draw it.\n\nThe type below is a record for a city, with a field whose type is itself a small\nsum type for the climate. Deriving `Generic` lets Aeson encode any value of these\ntypes to JSON without a hand-written instance. A nullary constructor like\n`Temperate` encodes as the string `\"Temperate\"`, which is exactly what the Python\nside will key its colours on.\n\n","cellType":"ProseCell"},{"cellDirty":false,"cellError":null,"cellId":15,"cellLang":"Haskell","cellOutputs":[],"cellSource":"-- cabal: build-depends: aeson, bytestring\n:set -XDeriveGeneric\n\nimport GHC.Generics (Generic)\nimport Data.Aeson (ToJSON, encode)\nimport qualified Data.ByteString.Lazy.Char8 as BL\n\ndata Climate = Tropical | Temperate | Arid | Continental\n  deriving (Show, Eq, Generic)\n\ninstance ToJSON Climate\n\ndata City = City\n  { cityName :: String\n  , population :: Double\n  , avgTempC :: Double\n  , climate :: Climate\n  }\n  deriving (Show, Generic)\n\ninstance ToJSON City\n","cellType":"CodeCell"},{"cellDirty":false,"cellError":null,"cellId":16,"cellLang":"Haskell","cellOutputs":[],"cellSource":"\nThe values are plain Haskell. Encoding the list gives one line of JSON, which the\nbridge carries across as a string.\n\n","cellType":"ProseCell"},{"cellDirty":false,"cellError":null,"cellId":17,"cellLang":"Haskell","cellOutputs":[{"oiMime":"text/plain","oiOutput":"encoded 8 cities\n"}],"cellSource":"let cities =\n      [ City \"Harare\" 1.5 18.5 Temperate\n      , City \"Cairo\" 9.5 22.1 Arid\n      , City \"Lagos\" 15.4 27.0 Tropical\n      , City \"Nairobi\" 4.4 19.0 Temperate\n      , City \"London\" 9.0 11.8 Continental\n      , City \"Mumbai\" 20.7 27.2 Tropical\n      , City \"Cape Town\" 4.6 16.9 Temperate\n      , City \"Dubai\" 3.6 28.0 Arid\n      ]\n\nexportBridge \"cities\" (BL.unpack (encode cities))\nputStrLn (\"encoded \" ++ show (length cities) ++ \" cities\")\n","cellType":"CodeCell"},{"cellDirty":false,"cellError":null,"cellId":18,"cellLang":"Haskell","cellOutputs":[],"cellSource":"\nOn the Python side the JSON becomes a list of dictionaries. The record fields are\nthe keys, and `climate` is the constructor name as a string, so it can index a\npalette directly. Each city is a point placed by temperature and population and\ncoloured by its climate.\n\n","cellType":"ProseCell"},{"cellDirty":false,"cellError":null,"cellId":19,"cellLang":"Python","cellOutputs":[{"oiMime":"image/png;base64","oiOutput":"iVBORw0KGgoAAAANSUhEUgAAAvAAAAHZCAYAAADg7Q8ZAAAAOnRFWHRTb2Z0d2FyZQBNYXRwbG90bGliIHZlcnNpb24zLjExLjAsIGh0dHBzOi8vbWF0cGxvdGxpYi5vcmcvlcelbwAAAAlwSFlzAAAQ6wAAEOsBUJTofAAAmKFJREFUeJzt3Qd8E/X7B/AHWlpKWaXsvUEQZO+9C7KXggrIRtygKMhGFMQBOBgi4GAqKq LyIAzgiYiIiIg8CAN4IiIiIiLxHP8H5ywucZkC1R0AAAAASUVORK5CYII=\n"}],"cellSource":"import json\n\ncities = json.loads(_bridge_cities)\n\npalette = {\n    \"Tropical\": \"#c2674a\",\n    \"Temperate\": \"#6f9355\",\n    \"Arid\": \"#d8a657\",\n    \"Continental\": \"#6083b0\",\n}\n\nfig, ax = plt.subplots(figsize=(7.5, 4.5))\nfor c in cities:\n    ax.scatter(\n        c[\"avgTempC\"], c[\"population\"],\n        s=140, color=palette[c[\"climate\"]],\n        edgecolor=\"#33312e\", zorder=3,\n    )\n    ax.annotate(\n        c[\"cityName\"], (c[\"avgTempC\"], c[\"population\"]),\n        xytext=(7, 4), textcoords=\"offset points\", fontsize=9,\n    )\n\nfor label, colour in palette.items():\n    ax.scatter([], [], color=colour, edgecolor=\"#33312e\", label=label)\nax.legend(title=\"climate\", loc=\"upper left\")\nax.set_xlabel(\"average temperature (degC)\")\nax.set_ylabel(\"population (millions)\")\nax.set_title(\"Cities by climate, modelled in Haskell\")\nax.grid(True, alpha=0.25)\nshow_plot(fig)\n","cellType":"CodeCell"},{"cellDirty":false,"cellError":null,"cellId":20,"cellLang":"Haskell","cellOutputs":[],"cellSource":"\nThe colours and the legend come straight from the `Climate` constructors. Add a\ncase to the sum type in Haskell, give it a colour in the palette, and the plot\nfollows.\n\n## Sending results back\n\nThe bridge runs both ways. A Python cell can export a value, and a Haskell cell\nbelow it reads it under the same `_bridge_` name. JSON is the natural carrier.\n\n","cellType":"ProseCell"},{"cellDirty":false,"cellError":null,"cellId":21,"cellLang":"Python","cellOutputs":[],"cellSource":"import json\n\nsummary = {\"count\": len(cities), \"hottest\": max(cities, key=lambda c: c[\"avgTempC\"])[\"cityName\"]}\nexportBridge(\"summary\", json.dumps(summary))\n","cellType":"CodeCell"},{"cellDirty":false,"cellError":null,"cellId":22,"cellLang":"Haskell","cellOutputs":[],"cellSource":"\n","cellType":"ProseCell"},{"cellDirty":false,"cellError":null,"cellId":23,"cellLang":"Haskell","cellOutputs":[{"oiMime":"text/plain","oiOutput":"Python sent: {\"count\": 8, \"hottest\": \"Dubai\"}\n"}],"cellSource":"putStrLn (\"Python sent: \" ++ _bridge_summary)\n","cellType":"CodeCell"},{"cellDirty":false,"cellError":null,"cellId":24,"cellLang":"Haskell","cellOutputs":[],"cellSource":"\n## How it runs\n\nEach language runs in its own subprocess. They share no memory; the only thing\nthat crosses is whatever you send over the bridge, and it always crosses as a\nstring, so the receiving side decides how to read it. CSV from a dataframe goes\nthrough `pandas.read_csv(io.StringIO(...))`, a `show`-printed Haskell value\nthrough `ast.literal_eval`, and JSON through `json.loads`.\n\nWhen you run the whole notebook, Haskell cells run first in dependency order, then\nLean, then Python top to bottom. That ordering is why a Haskell value is ready by\nthe time a Python cell asks for it. Sessions persist until you reset them, so the\nPython interpreter keeps its state between runs the same way the Haskell session\ndoes.\n","cellType":"ProseCell"}],"nbTitle":"tutorial-python-integration.md"};

window.__SABELA_MARKDOWN__ = "# Haskell and Python in one notebook\n\nMost data work ends up split across two languages. The shape of the data, the\nrules it obeys, the transformations that must stay correct, all of that is a good\nfit for Haskell and its types. The plotting, the quick numerical work, and the\nmachine-learning libraries live in Python. Moving between the two usually means\nfiles on disk, a serialisation format, and a script to glue them together.\n\nSabela runs both in the same document. A Haskell cell and a Python cell sit in\none notebook, each in its own process, and values cross between them over a small\nbridge. This notebook works through that, ending with a Haskell data type whose\nvalues are drawn by matplotlib.\n\nPython 3 needs to be on the path. Everything else is declared in the cells.\n\n## A Python cell\n\nA code cell runs Haskell by default. To make it a Python cell, pick **py** from\nthe language dropdown in the cell's gutter. The border turns yellow and the cell\nruns against a Python interpreter instead.\n\n```python\nprint(\"Hello from Python\")\n```\n\n> <!-- scripths:mime text/plain -->\n> Hello from Python\n\nThe interpreter stays alive between cells, so anything bound in one cell is in\nscope in the cells below it, the same way a Haskell binding is.\n\n```python\ngreeting = \"from the same session\"\nnumbers = [1, 2, 3, 4]\n```\n\n```python\nprint(greeting)\nprint(\"sum:\", sum(numbers))\n```\n\n> <!-- scripths:mime text/plain -->\n> from the same session\n> sum: 10\n\n## Drawing with matplotlib\n\nA Python cell can return rich output, not just text. The helpers `displayHtml`,\n`displayMarkdown`, `displaySvg`, and `displayImage` each emit a value the notebook\nrenders inline. For matplotlib the one to reach for is `displayImage`, which takes\na MIME type and base64 data, so a figure is saved to a buffer and handed over as a\nPNG.\n\nThe first cell sets up matplotlib and a small helper. The `# pip:` lines declare\nthe packages; Sabela installs them into a private virtual environment the first\ntime the cell runs, so there is nothing to install by hand.\n\n```python\n# pip: matplotlib\n# pip: numpy\nimport matplotlib\n\nmatplotlib.use(\"Agg\")\nimport matplotlib.pyplot as plt\nimport numpy as np\nimport base64, io\n\n\ndef show_plot(fig=None):\n    fig = fig or plt.gcf()\n    buf = io.BytesIO()\n    fig.savefig(buf, format=\"png\", bbox_inches=\"tight\", dpi=110)\n    buf.seek(0)\n    displayImage(\"image/png\", base64.b64encode(buf.read()).decode())\n    plt.close(fig)\n```\n\nWith that in place, a plot is ordinary matplotlib followed by `show_plot`.\n\n```python\nx = np.linspace(0, 4 * np.pi, 200)\nfig, ax = plt.subplots(figsize=(7, 3))\nax.plot(x, np.sin(x), label=\"sin\", color=\"#c2674a\")\nax.plot(x, np.cos(x), label=\"cos\", color=\"#6083b0\")\nax.set_title(\"A first figure\")\nax.legend()\nax.grid(True, alpha=0.25)\nshow_plot(fig)\n```\n\n> <!-- scripths:mime image/png;base64 -->\n> iVBORw0KGgoAAAANSUhEUgAAApsAAAFFCAYAAACjTiamAAAAOnRFWHRTb2Z0d2FyZQBNYXRwbG90bGliIHZlcnNpb24zLjExLjAsIGh0dHBzOi8vbWF0cGxvdGxpYi5vcmcvlcelbwAAAAlwSFlzAAAQ6wAAEOsBUJTofAAAlqpJREFUeJztnQV0XNe19/9iZkaLLBlkWSZZlpkpzLHDcdJA0zbpa/vKzdf2ta+QNvDaUMOcOHacmBlltmRZssBiZsYZzXxrnzt3LBklWYN3/9aaNWdGA3fOvbp3nw3/baPVarVgGIZhGIZhGANga4gPZRiGYRiGYRg2NhmGYRiGYRiDwp5NhmEYhmEYxmCwsckwDMMwDMMYDDY2GYZhGIZhGIPBxibDMAzDMAxjMNjYZBiGYRiGYQwGG5sMwzAMwzCMwWBjk2EYhmEYhjEY9ob7aIZhGMujq6sLFy5cQFtbG6Kjo+Hl5YWMjAzExsYiJCTE1Jtn9tvHMAxzKezZZBjGaujt7cWhQ4eQnp4+ovd/8sknCA4OxuTJkzF37lx8+umnyM3NFeP169eP2nYWFxeL7ezv7zfL7WMYhhlN2NhkGMZq+OKLL4ThlZaWhpMnTw7rve3t7XjqqafQ2dmJ5ORkzJ49G+Hh4fDw8BDj0NDQUdvOl19+WWwnfac5bh/DMMxowmF0hmGshnfeeQdBQUFoamoS4+nTpw/5vefPnxcG3R/+8Af88pe/HPQ38kKaGnPfPoZhmKvBxibDMFZBYWEh9u/fj5///OfCMKOQ89///ne4uLhc971nzpzBwYMHB4XiL2VgTiR9V3V1tfAo2tjYoKSkBFVVVZgyZYr4Pq1Wi8rKStTW1gqP48BcyqysLPFa4ujRo3B3dxfjsWPHCkN5NLZPhrygFGb39vYWf6ewPaUYhIWFiXxPIicnBx0dHUhJSRn0XrVaLbaPvKdRUVFD+t1EX18f8vLyxD39Jk9Pz+vOP8MwVo6WYRjGCvjFL36hpVNafn6+dtOmTW d-depends: aeson, bytestring\n:set -XDeriveGeneric\n\nimport GHC.Generics (Generic)\nimport Data.Aeson (ToJSON, encode)\nimport qualified Data.ByteString.Lazy.Char8 as BL\n\ndata Climate = Tropical | Temperate | Arid | Continental\n  deriving (Show, Eq, Generic)\n\ninstance ToJSON Climate\n\ndata City = City\n  { cityName :: String\n  , population :: Double\n  , avgTempC :: Double\n  , climate :: Climate\n  }\n  deriving (Show, Generic)\n\ninstance ToJSON City\n```\n\nThe values are plain Haskell. Encoding the list gives one line of JSON, which the\nbridge carries across as a string.\n\n```haskell\nlet cities =\n      [ City \"Harare\" 1.5 18.5 Temperate\n      , City \"Cairo\" 9.5 22.1 Arid\n      , City \"Lagos\" 15.4 27.0 Tropical\n      , City \"Nairobi\" 4.4 19.0 Temperate\n      , City \"London\" 9.0 11.8 Continental\n      , City \"Mumbai\" 20.7 27.2 Tropical\n      , City \"Cape Town\" 4.6 16.9 Temperate\n      , City \"Dubai\" 3.6 28.0 Arid\n      ]\n\nexportBridge \"cities\" (BL.unpack (encode cities))\nputStrLn (\"encoded \" ++ show (length cities) ++ \" cities\")\n```\n\n> <!-- scripths:mime text/plain -->\n> encoded 8 cities\n\nOn the Python side the JSON becomes a list of dictionaries. The record fields are\nthe keys, and `climate` is the constructor name as a string, so it can index a\npalette directly. Each city is a point placed by temperature and population and\ncoloured by its climate.\n\n```python\nimport json\n\ncities = json.loads(_bridge_cities)\n\npalette = {\n    \"Tropical\": \"#c2674a\",\n    \"Temperate\": \"#6f9355\",\n    \"Arid\": \"#d8a657\",\n    \"Continental\": \"#6083b0\",\n}\n\nfig, ax = plt.subplots(figsize=(7.5, 4.5))\nfor c in cities:\n    ax.scatter(\n        c[\"avgTempC\"], c[\"population\"],\n        s=140, color=palette[c[\"climate\"]],\n        edgecolor=\"#33312e\", zorder=3,\n    )\n    ax.annotate(\n        c[\"cityName\"], (c[\"avgTempC\"], c[\"population\"]),\n        xytext=(7, 4), textcoords=\"offset points\", fontsize=9,\n    )\n\nfor label, colour in palette.items():\n    ax.scatter([], [], color=colour, edgecolor=\"#33312e\", label=label)\nax.legend(title=\"climate\", loc=\"upper left\")\nax.set_xlabel(\"average temperature (degC)\")\nax.set_ylabel(\"population (millions)\")\nax.set_title(\"Cities by climate, modelled in Haskell\")\nax.grid(True, alpha=0.25)\nshow_plot(fig)\n```\n\n> <!-- scripths:mime image/png;base64 -->\n> iVBORw0KGgoAAAANSUhEUgAAAvAAAAHZCAYAAADg7Q8ZAAAAOnRFWHRTb2Z0d2FyZQBNYXRwbG90bGliIHZlcnNpb24zLjExLjAsIGh0dHBzOi8vbWF0cGxvdGxpYi5vcmcvlcelbwAAAAlwSFlzAAAQ6wAAEOsBUJTofAAAmKFJREFUeJzt3Qd8E/X7B/AHWlpKWaXsvUEQZO+9C7KXggrIRtygKMhGFMQBOBgi4GAqKqMs2bJ3WbL3LHuPkv/r8/C7/JM0bZM2bZP08369IuZyd7lcL5fnvvd8n28yk8lkEiIiIiIi8gjJE3sDiIiIiIjIcQzgiYiIiIg8CAN4IiIiIiIPwgCeiIiIiMiDMIAnIiIiIvIgDOCJiIiIiDwIA3giIiIiIg/CAJ6IiIiIyIMwgCciIiIi8iAM4Im8xGeffSbdu3ePt/ld6ZNPPpE333xT3I29fZKY+4msHTp0SNq0aSP//POP2/99ndlWbz/GXP19X79+ve7b/fv3RzuNyJv5JvYGEFH0Vq1apUHA2bNnxdfXV3LlyiWlS5eWxo0bS4oUKczzbdiwQbZv32617PDhw+XcuXMyadKkSOu1N39CWb16tVy8eFHcjb19kpj7ydG/ZVIRHh4uv//+uzRq1Mjt/77ObGt8bcP48eNl3bp1MnHiRMmaNWuk11esWKHH09tvvy3Vq1cXT/m+nzp1Svdt3759o51G5M0YwBO5qaNHj8pLL70kO3bssPt65syZZfPmzZIvXz59/tFHH8n169et5sGPN1oC7bE3P7nvforub0meLb6Osa1bt2pQixZ+e44dO6avt2jRIl4DeCJyPQbwRG4ILa3VqlWTS5cuSc6cOaVDhw5SrFgxfe306dOye/duWbRokdy8edO8TNWqVZ16D2fnT6q4n4jHGBG5GwbwRG7ovffe0+C9ZcuW8uuvv0pAQECkea5cuSL+/v7m52hlQ4valClT9Pnrr78uYWFhcvv2bc0NNYwePVoKFSoUaX7D06dPZcGCBZq6g1bB3Llz6wVEyZIlreZ78uSJtt5t3LhR58ubN6+8+OKLUqFCBac+K9axdOlSiYiIkPr16+tdh2TJkpnTRg4fPiwzZswQHx8fq+UuX74sffr0kSZNmkiXLl1ifB98rr///ls/17Vr16RAgQLy8ssvS9GiRaNdzt5+Qk7vjRs3ZMKECbqvlixZotuH9dWsWdN8B2Xq1Kma+vTCCy/orX17f0e0qv/xxx/6Of38/PTCDeuxTI+K6W/pzN/NWa78rHfv3pWZM2fKtm3b9Ph57rnnpFOnTpI9e/ZI8+Lvi/SO//77T3LkyCHdunWLchvj47M7s05ntjU2x1hoaKj8+eef8vDhQ6ldu7a8+uqrkjx5/HZhc+S4jOt5YOzYsbJlyxY9XmrVqqXT9uzZI3PnzpWTJ09KmjRppF69etK6dWvzOYGI/sdERG7l2rVrpuTJk5syZMhgun37tsPLNWnSxJQlSxbz8+DgYBO+4raPTZs22Z0frl69aqpcuXKkZbA9kyZNMs/3+PFjU926de2uf8yYMTFua9WqVU0FChQwvffee5GW     <script>
const isStatic = !!window.__SABELA_STATIC__;
const _query = new URLSearchParams(location.search);
// 'notebook' (tutorial) mode shows each code cell's source; 'dashboard'
// (default) shows only prose + outputs. Static shares pin the mode via the
// injected flag; the live editor can request notebook mode with ?mode=notebook.
const renderMode =
  window.__SABELA_RENDER_MODE__ || (_query.get('mode') === 'notebook' ? 'notebook' : 'dashboard');
// ?print=1 — open straight into the browser print dialog (used by the editor's
// "Save as PDF" menu items, which open this page in a new tab).
const autoPrint = _query.get('print') === '1';
const HLJS_LANG = { Haskell: 'haskell', Python: 'python' };
let notebookData = null;

// ── Theme handling (the same picker as the editor; 'sabela-theme' key) ──
const THEMES = [
  { id: 'warm', name: 'Warm Paper', mode: 'light', bg: '#f7f3ec', accent: '#c2674a' },
  { id: 'nord', name: 'Nord', mode: 'dark', bg: '#2e3440', accent: '#88c0d0' },
  { id: 'nord-light', name: 'Nord Light', mode: 'light', bg: '#eceff4', accent: '#5e81ac' },
  { id: 'nord-aurora', name: 'Aurora Purple', mode: 'dark', bg: '#2e3440', accent: '#b48ead' },
  { id: 'nord-ember', name: 'Aurora Ember', mode: 'dark', bg: '#2e3440', accent: '#d08770' },
  { id: 'vscode', name: 'VS Code Dark', mode: 'dark', bg: '#1e1e1e', accent: '#3794ff' },
];
function currentTheme() {
  const t = document.documentElement.dataset.theme;
  return THEMES.some((x) => x.id === t) ? t : 'warm';
}
function cssVar(name, fallback) {
  return (getComputedStyle(document.documentElement).getPropertyValue(name) || fallback).trim();
}
function applyTheme(theme, { persist = true } = {}) {
  document.documentElement.dataset.theme = theme;
  if (persist) {
    localStorage.setItem('sabela-theme', theme);
    window.__sabelaThemePinned = true;
  }
  // Re-render iframes with the current theme colors.
  document.querySelectorAll('iframe[data-last-content]').forEach((f) => {
    if (!f.dataset.lastContent) return;
    if (f.dataset.staticFrame) {
      f.srcdoc = staticSrcdoc(f.dataset.lastContent, f.dataset.iframeKind || 'content', f.id);
      return;
    }
    try {
      const doc = f.contentDocument || f.contentWindow?.document;
      if (!doc) return;
      doc.open();
      const style = f.dataset.iframeKind === 'widget' ? widgetIframeStyle() : iframeContentStyle();
      doc.write(style + f.dataset.lastContent);
      doc.close();
    } catch {}
  });
  markActiveTheme();
}
function markActiveTheme() {
  const cur = currentTheme();
  document
    .querySelectorAll('.theme-menu-item')
    .forEach((el) => el.classList.toggle('active', el.dataset.theme === cur));
}
function buildThemeMenu() {
  let menu = document.getElementById('theme-menu');
  if (menu) return menu;
  menu = document.createElement('div');
  menu.id = 'theme-menu';
  menu.className = 'theme-menu';
  THEMES.forEach((t) => {
    const item = document.createElement('button');
    item.className = 'theme-menu-item';
    item.dataset.theme = t.id;
    item.innerHTML =
      `<span class="sw" style="background:${t.bg}"><i style="background:${t.accent}"></i></span>` +
      `<span class="nm">${t.name}</span>`;
    item.onclick = () => {
      applyTheme(t.id);
      menu.classList.remove('open');
    };
    menu.appendChild(item);
  });
  document.body.appendChild(menu);
  return menu;
}
function openThemePicker() {
  const menu = buildThemeMenu();
  const btn = document.getElementById('theme-toggle');
  if (btn) {
    const r = btn.getBoundingClientRect();
    menu.style.top = r.bottom + 6 + 'px';
    menu.style.right = window.innerWidth - r.right + 'px';
  }
  const open = menu.classList.toggle('open');
  markActiveTheme();
  if (open) {
    setTimeout(() => {
      document.addEventListener(
        'click',
        (e) => {
          if (!menu.contains(e.target) && e.target !== btn && !btn?.contains(e.target))
            menu.classList.remove('open');
        },
        { once: true }
      );
    }, 0);
  }
}
// The header button's onclick is toggleTheme(); keep the name, open the picker.
function toggleTheme() {
  openThemePicker();
}
function iframeContentStyle() {
  const bg = cssVar('--bg-card', '#ffffff');
  const fg = cssVar('--fg', '#0a0a0a');
  const fgHead = cssVar('--fg-heading', '#000000');
  const muted = cssVar('--bg-muted', '#fafafa');
  const border = cssVar('--border', '#e4e4e7');
  const accent = cssVar('--accent', '#0066ff');
  const altRow = `rgba(${cssVar('--accent-rgb', '0,102,255')},0.05)`;
  return `<style>body{background:${bg};color:${fg};font-family:'Geist',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;font-size:15px;margin:0;padding:12px 16px;line-height:1.6;-webkit-font-smoothing:antialiased}img{max-width:100%}a{color:${accent}}table{border-collapse:separate;border-spacing:0;width:100%;border:1px solid ${border};border-radius:8px;overflow:hidden;margin:14px 0;font-size:14px}th,td{padding:10px 14px;text-align:left;border-bottom:1px solid ${border}}tr:last-child td{border-bottom:none}th{background:${muted};color:${fgHead};font-weight:600}tr:nth-child(even) td{background:${altRow}}input,select,button{font-family:inherit;font-size:14px;accent-color:${accent}}</style>`;
}
function widgetIframeStyle() {
  const fg = cssVar('--fg', '#0a0a0a');
  const fgDim = cssVar('--fg-dim', '#71717a');
  const accent = cssVar('--accent', '#0066ff');
  return `<style>body{background:transparent;color:${fg};font-family:'JetBrains Mono',ui-monospace,monospace;font-size:14px;margin:0;padding:6px 12px;line-height:1.2;font-variant-ligatures:none;font-feature-settings:"calt" 0,"liga" 0}input,select{font-family:inherit;font-size:14px;accent-color:${accent};vertical-align:middle}button{font-family:inherit;font-size:14px;cursor:pointer;accent-color:${accent};vertical-align:middle}label{font-weight:600;font-size:13px;color:${fgDim};display:inline-block;margin-right:8px;vertical-align:middle}</style>`;
}
// ── Static-export iframe: opaque-origin sandbox + in-document CSP ──
// In a shared/offline export we still run a script-drawn widget so its plot
// renders, but sandbox='allow-scripts' (NO allow-same-origin) gives the frame an
// opaque origin that cannot read this page (the embedded notebook JSON), cookies,
// or storage; the meta-CSP allows charting libs from trusted CDNs (cdnjs,
// jsdelivr) but keeps connect-src closed, so a plot can draw yet can't
// exfiltrate the page. 'unsafe-eval' is required because Vega compiles its
// dataflow expressions at runtime via the Function() constructor; it adds
// little risk here since 'unsafe-inline' already runs arbitrary script and the
// opaque origin + closed connect-src block any reads or exfiltration. Because
// the frame is cross-origin we cannot read its height, so it reports its own
// via postMessage.
const STATIC_CSP =
  "<meta http-equiv=\"Content-Security-Policy\" content=\"default-src 'none'; script-src 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; style-src 'unsafe-inline'; img-src data:; base-uri 'none'; form-action 'none'; frame-src 'none'\">";
let __staticFrameSeq = 0;
function staticSrcdoc(content, kind, id) {
  const style = kind === 'widget' ? widgetIframeStyle() : iframeContentStyle();
  const reporter =
    '<scr' +
    "ipt>(function(){function r(){try{parent.postMessage({__sabelaH:document.documentElement.scrollHeight,__sabelaId:'" +
    id +
    "'},'*')}catch(e){}}requestAnimationFrame(function(){r();setTimeout(r,60)})})();</scr" +
    'ipt>';
  return STATIC_CSP + style + content + reporter;
}
function mountStaticFrame(container, content, kind) {
  const id = 'sframe' + __staticFrameSeq++;
  const iframe = document.createElement('iframe');
  iframe.id = id;
  iframe.setAttribute('sandbox', 'allow-scripts');
  if (kind === 'widget') iframe.style.pointerEvents = 'none';
  iframe.style.height = (kind === 'widget' ? 60 : 80) + 'px';
  iframe.dataset.iframeKind = kind;
  iframe.dataset.lastContent = content;
  iframe.dataset.staticFrame = '1';
  iframe.srcdoc = staticSrcdoc(content, kind, id);
  container.appendChild(iframe);
}
window.addEventListener('message', (e) => {
  const d = e.data;
  if (d && typeof d.__sabelaH === 'number' && d.__sabelaId) {
    const el = document.getElementById(d.__sabelaId);
    if (el && el.dataset.staticFrame) el.style.height = Math.max(32, d.__sabelaH) + 'px';
  }
});
// Initial sync (renders iframes with the active theme).
applyTheme(currentTheme(), { persist: false });
// ── Initialization ───────────────────────────────────────────────
async function init() {
  if (isStatic) {
    notebookData = window.__SABELA_STATIC__;
    document.getElementById('edit-link').style.display = 'none';
    document.getElementById('export-btn').style.display = 'none';
  } else {
    const resp = await fetch('/api/notebook');
    notebookData = await resp.json();
  }
  renderDashboard(notebookData);
  if (renderMode === 'notebook') setupDownloadMd();
  if (!isStatic) connectSSE();
  // Opened with ?print=1 — let layout settle (iframes report heights, fonts
  // load), then drop straight into the print dialog.
  if (autoPrint) requestAnimationFrame(() => setTimeout(printToPdf, 300));
}

// In notebook (tutorial) mode, offer the notebook source for download so a
// reader can upload it into their own Sabela workspace and run it.
function setupDownloadMd() {
  const md = window.__SABELA_MARKDOWN__;
  const actions = document.getElementById('header-actions');
  if (!md || !actions || document.getElementById('dl-md-btn')) return;
  const btn = document.createElement('button');
  btn.id = 'dl-md-btn';
  btn.textContent = 'Download .md';
  btn.title = 'Download the notebook source — upload it into your own Sabela workspace to run it';
  btn.addEventListener('click', () => {
    const title = (notebookData && notebookData.nbTitle) || 'notebook.md';
    const name = /\.md$/.test(title) ? title.split('/').pop() : 'notebook.md';
    const blob = new Blob([md], { type: 'text/markdown' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = name;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => {
      URL.revokeObjectURL(a.href);
      a.remove();
    }, 0);
  });
  actions.insertBefore(btn, actions.firstChild);
}
// ── Print to PDF ─────────────────────────────────────────────────
// Browsers print an <iframe> as one atomic box: a tall frame is clipped at the
// page edge, not paginated. Content outputs (e.g. dataframe tables) live in
// iframes, so before printing we swap each one for inline, script-stripped DOM
// that flows across pages. SVG/markdown/image/JSON/plain outputs are already
// inline and need no help; short widget iframes are left as-is.

// Strip <script> elements and on*= handlers, then return the safe HTML. Inlining
// runs in this page's origin (unlike the sandboxed iframe), so for untrusted
// static shares this prevents the output HTML from executing.
function sanitizeForPrint(html) {
  const tpl = document.createElement('template');
  tpl.innerHTML = html;
  tpl.content.querySelectorAll('script').forEach((s) => s.remove());
  tpl.content.querySelectorAll('*').forEach((el) => {
    for (const attr of [...el.attributes]) {
      if (/^on/i.test(attr.name)) el.removeAttribute(attr.name);
    }
  });
  return tpl.innerHTML;
}

// Replace each content iframe with an inline .print-inline div; return undo fns.
function inlineContentFramesForPrint() {
  const frames = [...document.querySelectorAll('iframe[data-last-content]')].filter(
    (f) => f.dataset.iframeKind !== 'widget'
  );
  const restore = [];
  for (const f of frames) {
    const div = document.createElement('div');
    div.className = 'print-inline';
    div.innerHTML = sanitizeForPrint(f.dataset.lastContent || '');
    f.style.display = 'none';
    f.parentNode.insertBefore(div, f);
    restore.push(() => {
      div.remove();
      f.style.display = '';
    });
  }
  return restore;
}

function printToPdf() {
  const restore = inlineContentFramesForPrint();
  const cleanup = () => {
    restore.forEach((r) => r());
    window.removeEventListener('afterprint', cleanup);
  };
  window.addEventListener('afterprint', cleanup);
  requestAnimationFrame(() => window.print());
}
// ── Render dashboard ─────────────────────────────────────────────
function renderDashboard(nb) {
  document.getElementById('dashboard-title').textContent = formatTitle(nb.nbTitle);
  document.title = formatTitle(nb.nbTitle) + ' — Sabela Dashboard';

  const main = document.getElementById('main-content');
  main.innerHTML = '';

  const cells = nb.nbCells || [];
  for (const cell of cells) {
    renderCellOutputs(main, cell, null);
  }
}

// Render KaTeX inside a markdown source before handing to marked, so
// $...$ / $$...$$ blocks survive marked's underscore/star handling.
// Safe no-op if katex isn't available.
function renderMarkdownWithMath(src) {
  let s = src || '';
  if (typeof katex !== 'undefined') {
    s = s.replace(/\$\$([\s\S]+?)\$\$/g, (_, tex) => {
      try {
        return katex.renderToString(tex.trim(), { displayMode: true, throwOnError: false });
      } catch (_e) {
        return _;
      }
    });
    s = s.replace(/(^|[^\\$])\$([^\$\n]+?)\$(?!\d)/g, (_, pre, tex) => {
      try {
        return pre + katex.renderToString(tex, { displayMode: false, throwOnError: false });
      } catch (_e) {
        return _;
      }
    });
  }
  return marked.parse(s);
}

// ── Render a single cell's outputs into the container ────────────
function renderCellOutputs(container, cell, insertBefore) {
  if (cell.cellType === 'ProseCell') {
    const section = document.createElement('div');
    section.className = 'dash-section';
    section.dataset.cellId = cell.cellId;
    section.innerHTML = renderMarkdownWithMath(cell.cellSource || '');
    section.querySelectorAll('table').forEach((t) => {
      const w = document.createElement('div');
      w.style.overflowX = 'auto';
      t.parentNode.insertBefore(w, t);
      w.appendChild(t);
    });
    container.insertBefore(section, insertBefore);
    return;
  }

  // CodeCell — in notebook (tutorial) mode, show the source above its outputs.
  if (renderMode === 'notebook' && (cell.cellSource || '').trim()) {
    const codeWrap = document.createElement('div');
    codeWrap.className = 'dash-code';
    codeWrap.dataset.cellId = cell.cellId;
    const pre = document.createElement('pre');
    const codeEl = document.createElement('code');
    codeEl.className = 'hljs';
    const src = cell.cellSource || '';
    const hl = HLJS_LANG[cell.cellLang || 'Haskell'];
    if (hl && window.hljs && hljs.getLanguage(hl)) {
      codeEl.innerHTML = hljs.highlight(src, { language: hl }).value;
    } else {
      codeEl.textContent = src;
    }
    pre.appendChild(codeEl);
    codeWrap.appendChild(pre);
    container.insertBefore(codeWrap, insertBefore);
  }

  // CodeCell — render all outputs inline in order
  const outputs = cell.cellOutputs || [];
  const merged = mergeHtmlOutputs(outputs);
  for (const o of merged) {
    if (!o.oiOutput || !o.oiOutput.trim()) continue;
    const isWidget = classifyOutput(o) === 'widget';
    const card = document.createElement('div');
    card.className = isWidget ? 'dash-widget' : 'dash-output';
    card.dataset.cellId = cell.cellId;

    if (isWidget) {
      renderWidgetOutput(card, o, cell.cellId);
    } else {
      renderOutput(card, o.oiOutput, o.oiMime);
    }
    container.insertBefore(card, insertBefore);
  }

  // Show errors
  if (cell.cellError && cell.cellError.trim()) {
    const errEl = document.createElement('div');
    errEl.className = 'dash-error';
    errEl.dataset.cellId = cell.cellId;
    errEl.textContent = cell.cellError;
    container.insertBefore(errEl, insertBefore);
  }
}

// ── Output classification ────────────────────────────────────────
function classifyOutput(item) {
  if (
    item.oiMime === 'text/html' &&
    item.oiOutput &&
    item.oiOutput.includes('parent.postMessage')
  ) {
    return 'widget';
  }
  return 'content';
}

// ── Merge consecutive HTML outputs (non-widget only) ─────────────
function mergeHtmlOutputs(outputs) {
  const merged = [];
  for (const o of outputs) {
    const isWidget = classifyOutput(o) === 'widget';
    const last = merged[merged.length - 1];
    if (
      !isWidget &&
      o.oiMime === 'text/html' &&
      last &&
      last.oiMime === 'text/html' &&
      classifyOutput(last) !== 'widget'
    ) {
      last.oiOutput += '\n' + o.oiOutput;
    } else {
      merged.push({ oiMime: o.oiMime, oiOutput: o.oiOutput });
    }
  }
  return merged;
}
// ── Render a content output ──────────────────────────────────────
function renderOutput(container, content, mime) {
  if (mime === 'text/html') {
    if (isStatic) {
      mountStaticFrame(container, content, 'content');
      return;
    }
    const iframe = document.createElement('iframe');
    iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin');
    iframe.style.visibility = 'hidden';
    container.appendChild(iframe);
    requestAnimationFrame(() => {
      const doc = iframe.contentDocument || iframe.contentWindow?.document;
      if (!doc) return;
      iframe.dataset.lastContent = content;
      doc.open();
      iframe.onload = () => {
        iframe.style.height = Math.max(60, doc.body.scrollHeight + 20) + 'px';
        iframe.style.visibility = '';
      };
      doc.write(iframeContentStyle() + content);
      doc.close();
    });
  } else if (mime === 'text/markdown') {
    const div = document.createElement('div');
    div.className = 'mime-markdown';
    div.innerHTML = renderMarkdownWithMath(content);
    div.querySelectorAll('table').forEach((t) => {
      const w = document.createElement('div');
      w.style.overflowX = 'auto';
      t.parentNode.insertBefore(w, t);
      w.appendChild(t);
    });
    container.appendChild(div);
  } else if (mime === 'image/svg+xml') {
    const div = document.createElement('div');
    div.className = 'mime-svg';
    div.innerHTML = content;
    container.appendChild(div);
  } else if (mime.startsWith('image/') && mime.includes('base64')) {
    const div = document.createElement('div');
    div.className = 'mime-image';
    const mimeClean = mime.replace(';base64', '');
    div.innerHTML = '<img src="data:' + mimeClean + ';base64,' + content.trim() + '" />';
    container.appendChild(div);
  } else if (mime === 'application/json') {
    const div = document.createElement('div');
    div.className = 'mime-json';
    try {
      div.textContent = JSON.stringify(JSON.parse(content), null, 2);
    } catch {
      div.textContent = content;
    }
    container.appendChild(div);
  } else if (mime === 'text/latex') {
    const div = document.createElement('div');
    div.className = 'mime-latex';
    try {
      katex.render(content, div, { displayMode: true, throwOnError: false });
    } catch {
      div.textContent = content;
    }
    container.appendChild(div);
  } else {
    const div = document.createElement('div');
    div.className = 'mime-plain';
    div.textContent = content;
    container.appendChild(div);
  }
}

// ── Render widget inline ─────────────────────────────────────────
function renderWidgetOutput(container, output, cellId) {
  if (isStatic) {
    // Script-drawn widgets (e.g. the scatter <canvas>) need their script to run to
    // render at all — do it in the opaque-origin, network-dead sandbox (see
    // mountStaticFrame), inert via pointer-events:none. Form controls have no such
    // need and stay as greyed-out, script-stripped placeholders.
    if (/<canvas|<script/i.test(output.oiOutput)) {
      mountStaticFrame(container, output.oiOutput, 'widget');
      return;
    }
    const wrapper = document.createElement('div');
    wrapper.className = 'static-widget';
    let cleaned = output.oiOutput
      .replace(/\s*on\w+="[^"]*"/g, '')
      .replace(/<(input|select|button)/gi, '<$1 disabled');
    wrapper.innerHTML = cleaned;
    container.appendChild(wrapper);
    return;
  }

  const iframe = document.createElement('iframe');
  iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin');
  iframe.style.visibility = 'hidden';
  container.appendChild(iframe);

  requestAnimationFrame(() => {
    const doc = iframe.contentDocument || iframe.contentWindow?.document;
    if (!doc) return;
    iframe.dataset.lastContent = output.oiOutput;
    iframe.dataset.iframeKind = 'widget';
    doc.open();
    iframe.onload = () => {
      iframe.style.height = Math.max(32, doc.body.scrollHeight) + 'px';
      iframe.style.visibility = '';
    };
    doc.write(widgetIframeStyle() + output.oiOutput);
    doc.close();
  });
}
// ── SSE (live mode only) ─────────────────────────────────────────
function connectSSE() {
  const evtSource = new EventSource('/api/events');
  evtSource.onmessage = (e) => {
    const ev = JSON.parse(e.data);
    switch (ev.type) {
      case 'cellUpdating':
        showStatus('Running...', true);
        break;
      case 'cellResult':
        updateDashboardCell(ev.cellId, ev.outputs || [], ev.error);
        break;
      case 'executionDone':
        hideStatus();
        break;
      case 'sessionStatus':
        if (ev.message === 'ready') hideStatus();
        else showStatus(ev.message, true);
        break;
    }
  };
  evtSource.onerror = () => {
    showStatus('Disconnected', false);
  };
}

// ── Update a cell in the dashboard ───────────────────────────────
function updateDashboardCell(cellId, outputs, error) {
  if (!notebookData) return;
  const cell = (notebookData.nbCells || []).find((c) => c.cellId === cellId);
  if (!cell) return;

  cell.cellOutputs = outputs;
  cell.cellError = error || null;

  // Remove only this cell's existing DOM nodes
  const main = document.getElementById('main-content');
  main.querySelectorAll(`[data-cell-id="${cellId}"]`).forEach((el) => el.remove());

  // Find the next cell's first DOM node to insert before
  const cells = notebookData.nbCells;
  const cellIndex = cells.indexOf(cell);
  let insertBefore = null;
  for (let j = cellIndex + 1; j < cells.length; j++) {
    const nextNode = main.querySelector(`[data-cell-id="${cells[j].cellId}"]`);
    if (nextNode) {
      insertBefore = nextNode;
      break;
    }
  }

  // Re-render just this cell
  renderCellOutputs(main, cell, insertBefore);
}

// ── Widget postMessage bridge (live mode) ────────────────────────
const _widgetTimers = new Map();
window.addEventListener('message', (e) => {
  if (isStatic) return;
  const d = e.data;
  if (d && d.type === 'widget') {
    const key = d.cellId + ':' + d.name;
    clearTimeout(_widgetTimers.get(key));
    _widgetTimers.set(
      key,
      setTimeout(() => {
        _widgetTimers.delete(key);
        fetch('/api/widget', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ wuCellId: d.cellId, wuName: d.name, wuValue: d.value }),
        });
      }, 300)
    );
  }
});

// ── Status indicator ─────────────────────────────────────────────
function showStatus(msg, running) {
  const el = document.getElementById('status-indicator');
  el.textContent = msg;
  el.className = 'dash-status visible' + (running ? ' running' : '');
}
function hideStatus() {
  document.getElementById('status-indicator').className = 'dash-status';
}

// ── Export button (live mode) ────────────────────────────────────
function exportDashboard() {
  window.open('/api/export/dashboard', '_blank');
}

// ── Title formatting ─────────────────────────────────────────────
function formatTitle(path) {
  if (!path) return 'Dashboard';
  const name = path
    .split('/')
    .pop()
    .replace(/\.[^/.]+$/, '');
  return name.charAt(0).toUpperCase() + name.slice(1);
}

// ── Go ───────────────────────────────────────────────────────────
init();
    </script>
